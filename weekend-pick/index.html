  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; min-height: 100%; overflow-x: hidden; }
  body {
    font-family: 'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-size: 15px;
    line-height: 1.5;
    text-size-adjust: 100%;
    -webkit-text-size-adjust: 100%;
  }

  /* 앱 셸 */
  .app {
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* 헤더 */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: var(--brand);
    border-bottom: 1px solid var(--brand-ink);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 11px;
  }
  .avatar-img {
    background: var(--char-img) center/cover, var(--brand-soft);
    background-color: #fff8f1;
  }
  .header .avatar {
    width: 38px; height: 38px; border-radius: 50%;
    position: relative;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,.3);
  }
  .header .avatar .dot {
    position: absolute; bottom: -1px; right: -1px;
    width: 11px; height: 11px; border-radius: 50%;
    background: #4ade80; border: 2.5px solid var(--brand);
  }
  .header .meta { display: flex; flex-direction: column; line-height: 1.2; }
  .header .name { font-weight: 700; font-size: 15px; letter-spacing: -.01em; color: #fff; }
  .header .status { font-size: 12px; color: rgba(255,255,255,.72); margin-top: 2px; }

  /* 챗 */
  .chat {
    flex: 1;
    padding: 18px 16px 24px;
    display: flex; flex-direction: column; gap: 12px;
  }

  /* 시작 카드 (히어로) */
  .hero {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px;
    padding: 14px 0 8px;
    animation: fadeUp .5s ease both;
  }
  .hero-img {
    width: 160px; height: 160px; border-radius: 50%;
    box-shadow: var(--shadow-md);
    border: 1px solid var(--line);
  }
  .hero-title {
    font-size: 38px;
    font-weight: 900;
    letter-spacing: -.04em;
    text-align: center;
    margin: 8px 0 4px;
    line-height: 1.1;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .hero-title .emo {
    font-size: .82em;
    display: inline-block;
    transform-origin: bottom center;
    animation: wobble 2.4s ease-in-out infinite;
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(-7deg); }
    50%      { transform: rotate(7deg); }
  }
  .hero-sub {
    font-size: 17px;
    font-weight: 500;
    color: var(--ink-2);
    text-align: center;
    line-height: 1.55;
    max-width: 320px;
    margin: 2px 0 0;
  }

  /* 혜택 배너 (버튼) */
  .promo-banner {
    display: flex;
    align-items: center;
    gap: 12px;
    background: linear-gradient(135deg, #fff8e6 0%, #ffeec2 100%);
    border: 1px solid #f0c75e;
    border-radius: 14px;
    padding: 12px 14px;
    margin: 6px 0 4px;
    box-shadow: var(--shadow-sm);
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: all .15s ease;
  }
  .promo-banner:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
    border-color: #d99908;
  }
  .promo-banner:active { transform: translateY(0); }
  .promo-banner .emo {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #fff;
    display: grid; place-items: center;
    font-size: 19px;
    flex-shrink: 0;
    box-shadow: var(--shadow-sm);
  }
  .promo-banner .txt {
    font-size: 14px;
    line-height: 1.45;
    color: #5b3a05;
    flex: 1;
  }
  .promo-banner .txt b {
    font-weight: 800;
    color: #8a4d00;
  }
  .promo-banner .arrow {
    margin-left: 4px;
    font-size: 18px;
    color: #8a4d00;
    font-weight: 700;
    flex-shrink: 0;
    transition: transform .15s;
  }
  .promo-banner:hover .arrow { transform: translateX(3px); }

  /* 메시지 행 */
  .row {
    display: flex; gap: 8px;
    align-items: flex-end;
    animation: fadeUp .35s ease both;
  }
  .row.bot { justify-content: flex-start; }
  .row.user { justify-content: flex-end; }
  .row .ava {
    width: 30px; height: 30px; border-radius: 50%;
    flex-shrink: 0;
    border: 1px solid var(--line);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bubble {
    max-width: 80%;
    padding: 11px 14px;
    background: var(--bot);
    color: var(--ink);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    font-size: 14.5px;
    line-height: 1.5;
    word-break: break-word;
    box-shadow: var(--shadow-sm);
  }
  .bubble.intro {
    font-size: 16px;
    background: var(--brand-soft);
    color: var(--brand-ink);
    border: 1.5px solid var(--brand);
    box-shadow: 0 2px 10px rgba(47,125,74,.12);
  }
  .bubble.intro .b-main {
    color: var(--brand-ink);
  }
  .bubble.intro .b-sub {
    color: var(--brand-ink);
    opacity: .78;
  }
  .bubble .b-main {
    display: block;
    white-space: nowrap;
    font-weight: 700;
    font-size: 17px;
  }
  .bubble .b-sub {
    display: block;
    margin-top: 10px;
    color: var(--ink-2);
    font-size: 14.5px;
    line-height: 1.65;
  }
  .row.user .bubble {
    background: var(--brand);
    color: #fff;
    border-radius: 18px;
    border-bottom-right-radius: 6px;
  }
  .bubble .term { font-weight: 700; color: var(--brand-ink); }
  .row.user .bubble .term { color: #ffe9a0; }

  /* 카테고리 버튼 (2열 그리드) */
  .quick {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 6px;
    padding: 0;
  }
  .quick button {
    font-family: inherit;
    font-size: 15.5px;
    font-weight: 700;
    background: #fff;
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 14px;
    padding: 14px 14px;
    cursor: pointer;
    transition: all .15s ease;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow: var(--shadow-sm);
    letter-spacing: -.01em;
  }
  .quick button:hover {
    border-color: var(--brand);
    background: var(--brand-soft);
    color: var(--brand-ink);
    transform: translateY(-1px);
    box-shadow: var(--shadow-md);
  }
  .quick button:active { transform: translateY(0); }
  .quick button .emo {
    display: inline-grid;
    place-items: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--bg);
    font-size: 16px;
    flex-shrink: 0;
  }
  .quick button:hover .emo { background: #fff; }

  /* 섹션 제목 */
  .section-title {
    margin: 16px 0 4px;
    font-size: 13.5px;
    color: var(--ink-2);
    font-weight: 700;
    display: flex;
    align-items: baseline;
    gap: 6px;
    padding-left: 2px;
  }
  .section-title small {
    font-weight: 500;
    color: var(--ink-3);
    font-size: 12px;
  }

  /* 3열 칩 (연령대) */
  .quick.cols-3 {
    grid-template-columns: repeat(3, 1fr);
    gap: 7px;
  }
  .quick.cols-3 button {
    flex-direction: column;
    text-align: center;
    padding: 13px 6px;
    gap: 5px;
    font-size: 15px;
    font-weight: 700;
  }
  .quick.cols-3 button .emo {
    width: 36px; height: 36px;
    font-size: 18px;
  }

  /* 타이핑 인디케이터 */
  .typing {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 13px 14px;
    background: var(--bot);
    border-radius: 18px;
    border-bottom-left-radius: 6px;
    box-shadow: var(--shadow-sm);
  }
  .typing .d {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--ink-3);
    animation: tdot 1.2s infinite ease-in-out;
  }
  .typing .d:nth-child(2) { animation-delay: .15s; }
  .typing .d:nth-child(3) { animation-delay: .3s; }
  @keyframes tdot {
    0%, 60%, 100% { opacity: .3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-3px); }
  }

  /* 카드 캐러셀 */
  .cards-row {
    margin: 4px -16px 0 0;
    padding-left: 38px;
  }
  .cards-scroll {
    display: flex; gap: 10px;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    padding: 2px 16px 8px 0;
    scrollbar-width: none;
  }
  .cards-scroll::-webkit-scrollbar { display: none; }
  .product {
    flex: 0 0 200px;
    scroll-snap-align: start;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
    display: flex; flex-direction: column;
    text-decoration: none;
    color: inherit;
    transition: transform .15s, box-shadow .15s;
  }
  .product:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .product .thumb {
    width: 100%; aspect-ratio: 1;
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .product .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .product .thumb .fb {

  ];

  // ===== 매칭 로직 =====
  function tokenize(s) {
    return s.toLowerCase().replace(/[,.!?·~^&()\[\]"'`]/g," ").split(/\s+/).filter(Boolean);
  }
  function score(item, tokens) {
    let s = 0;
    const hay = (item.n + " " + item.k.join(" ")).toLowerCase();
    tokens.forEach(t => {
      if (!t) return;
      item.k.forEach(kw => {
        if (kw.includes(t) || t.includes(kw)) s += (kw === t ? 6 : 3);
      });
      if (item.n.toLowerCase().includes(t)) s += 4;
      if (t.length >= 2 && hay.includes(t)) s += 2;
    });
    return s;
  }
  function pickByScore(tokens) {
    const scored = ITEMS.map(it => ({ it, s: score(it, tokens) })).sort((a,b) => b.s - a.s);
    const top = scored.filter(x => x.s > 0).slice(0, 4);
    if (top.length >= 4) return { items: top.map(x => x.it), forced: false };
    const seed = tokens.join("").length + (tokens.join("").charCodeAt(0)||0);
    const rest = ITEMS.filter(it => !top.find(t => t.it.n === it.n));
    rest.sort((a,b) => ((a.n.length*7+seed) % 31) - ((b.n.length*7+seed) % 31));
    const filled = top.map(x => x.it).concat(rest.slice(0, 4 - top.length));
    return { items: filled, forced: top.length === 0 };
  }

  function whyLine(item, query) {
    const q = (query || "").trim();
    const buckets = {
      "닭|치킨|후라이드": [
        "치킨 대신 집에서 통닭, 의외로 든든해요",
        "주말 저녁 한 방이면 이거",
        q + " 생각났다면 일단 한 마리"
      ],
      "매콤|매운|맵": [
        "매콤 + 밥, 실패 없는 조합",
        "한 입에 알싸하게, 밥 두 그릇 각",
        "매콤한 거 당길 때 손이 가요"
      ],
      "비빔|나물|밥": [
        "비빔밥 한 그릇에 올리면 끝",
        "나물 한 가지 더하면 식탁이 풍성",
        "밥에 슥슥 비비기만 해도 한 끼"
      ],
      "술안주|맥주|소주": [
        "맥주 한 캔이랑 잘 어울려요",
        "안주 고민 끝, 꺼내기만 하면 됨",
        "친구 부르기 전에 사두면 좋아요"
      ],
      "간단|쉽게|빨리": [
        "10분이면 한 끼 차려져요",
        "냉장고에 있으면 든든한 기본템",
        "손 많이 안 가는 메뉴"
      ],
      "아이|애|어린이": [
        "아이가 잘 먹는 순한 맛",
        "도시락 반찬으로 무난해요",
        "맵지 않게 차리고 싶을 때"
      ],
      "손님|초대|모임|가족": [
        "손님상에 올려도 모양 빠지지 않아요",
        "가족 다 모이는 날 메인으로",
        "온 가족이 둘러앉기 좋은 메뉴"
      ],
      "선물|어버이|부모": [
        "부모님 갖다드리기 좋아요",
        "들고 가도 안 부끄러운 선물용"
      ],
      "감기|기침|목": [
        "환절기 목 칼칼할 때 한 잔",
        "따뜻하게 우려서 드시면 좋아요"
      ],
      "생선|회": [
        "생선 한 토막, 밥반찬으로 든든",
        "구우면 굽는 대로, 조리면 조리는 대로"
      ],
      "김치|찌개": [
        "김치 한 보시기로 한 끼 해결",
        "찌개 끓이기에도 좋아요"
      ],
      "채소|야채|샐러드": [
        "냉장고 채소 칸이 비었다면",
        "한 끼 만들 때 손 가는 기본 재료"
      ],
      "디저트|단것|초콜릿|간식": [
        "주말 오후 한 입씩 꺼내기 좋아요",
        "커피 옆에 두기 좋은 단짠"
      ]
    };
    for (const pat in buckets) {
      const re = new RegExp(pat);
      if (re.test(q) || item.k.some(k => re.test(k))) {
        const arr = buckets[pat];
        return arr[(item.n.length + q.length) % arr.length];
      }
    }
    const fallback = [
      "'" + (q || "그거") + "' 자리에 둘 만한 거",
      "딱 그건 아니지만, 비슷한 결로",
      "주말에 꺼내볼 만한 거",
      "이거 사두면 한 주가 든든",
      "이번 주 기획전에서 잘 나가요"
    ];
    return fallback[(item.n.length + q.length) % fallback.length];
  }

  function replyHeadline(query, forced) {
    const q = (query || "").trim();
    if (!q) return "골라봤어요";
    const term = `<span class="term">${escape(q)}</span>`;
    if (forced) {
      const v = [
        `음… ${term}은 딱 맞는 게 없어서, 비슷한 결로 끌어왔어요`,
        `${term} 그거… 이건 어때요? 비슷한 자리에 둘 만한 것들`,
        `${term} 못 찾았지만, 이쯤이면 대신할 만함`
      ];
      return v[q.length % v.length];
    }
    const v = [
      `${term} 생각났다면, 이거 어때요?`,
      `${term} 자리에 둘 만한 거 골라봤어요`,
      `${term} 좋죠, 그럼 이쪽으로 추천!`
    ];
    return v[q.length % v.length];
  }
  function escape(s){ return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  // ===== 메시지 추가 헬퍼 =====
  const chat = document.getElementById("chat");

  function addBotBubble(html) {
    const row = document.createElement("div");
    row.className = "row bot";
    row.innerHTML = `<div class="ava avatar-img"></div><div class="bubble">${html}</div>`;
    chat.appendChild(row);
    scrollSoon();
    return row;
  }
  function addUserBubble(text) {
    const row = document.createElement("div");
    row.className = "row user";
    row.innerHTML = `<div class="bubble">${escape(text)}</div>`;
    chat.appendChild(row);
    scrollSoon();
  }
  function addTyping() {
    const row = document.createElement("div");
    row.className = "row bot";
    row.innerHTML = `<div class="ava avatar-img"></div><div class="typing"><span class="d"></span><span class="d"></span><span class="d"></span></div>`;
    chat.appendChild(row);
    scrollSoon();
    return row;
  }
  function addCardsCarousel(items, query) {
    const wrap = document.createElement("div");
    wrap.className = "cards-row";
    wrap.innerHTML = `
      <div class="cards-scroll">
        ${items.map(it => `
          <a class="product" href="${PLAN_URL}" target="_blank" rel="noopener">
            <div class="thumb">
              <img src="${it.img}" alt="${escape(it.n)}" loading="lazy" referrerpolicy="no-referrer"
                   onerror="this.style.display='none';this.nextElementSibling.style.display='grid';">
              <div class="fb">${it.e}</div>
            </div>
            <div class="body">
              <div class="name">${escape(it.n)}</div>
              <div class="why">${escape(whyLine(it, query))}</div>
              <div class="row2">
                <div class="price">${it.p.toLocaleString()}<small>원</small></div>
                <div class="go">담기 →</div>
              </div>
            </div>
          </a>
        `).join("")}
      </div>
    `;
    chat.appendChild(wrap);
    scrollSoon();
  }
  function addDeadlineCard() {
    const el = document.createElement("div");
    el.className = "deadline-card";
    el.innerHTML = `
      <div class="tag"><span class="pulse"></span>이번 주 주문 마감 임박</div>
      <h3>5월 14일 (목) 오전 11:30</h3>
      <div class="when">이 시간 지나면 다음 주 배송으로 넘어가요</div>
      <div class="cd" data-cd></div>
      <a class="cta" href="${PLAN_URL}" target="_blank" rel="noopener">
        두레생협에서 장보기
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>
    `;
    chat.appendChild(el);
    tick();
    scrollSoon();
  }

  function scrollSoon() {
    requestAnimationFrame(() => {
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });
  }

  // ===== 흐름 =====
  function removeEntry() {
    const entry = document.getElementById("entry");
    if (entry) entry.remove();
  }

  function handle(query) {
    if (!query.trim()) return;
    removeEntry();
    addUserBubble(query);
    const t = addTyping();
    setTimeout(() => {
      t.remove();
      const tokens = tokenize(query);
      const { items, forced } = pickByScore(tokens);
      addBotBubble(replyHeadline(query, forced));
      setTimeout(() => {
        addBotBubble("이번 주 혜택 가득한 기획전에서 골라봤어요 👇");
        addCardsCarousel(items, query);
        setTimeout(() => addDeadlineCard(), 450);
      }, 380);
    }, 720);
  }

  const composer = document.getElementById("composer");
  const qInput = document.getElementById("q");
  const sendBtn = document.getElementById("send");

  qInput.addEventListener("input", () => { sendBtn.disabled = !qInput.value.trim(); });
  composer.addEventListener("submit", (e) => {
    e.preventDefault();
    const v = qInput.value.trim();
    if (!v) return;
    handle(v);
    qInput.value = "";
    sendBtn.disabled = true;
  });
  // 카테고리별 "관련 카테고리" - 품목 수 부족할 때 보충용
  const RELATED = {
    meat:    ["matchan", "seafood", "kimchi"],
    seafood: ["matchan", "meat",    "kimchi"],
    matchan: ["veggie",  "kimchi",  "meat"],
    veggie:  ["matchan", "kimchi",  "grain"],
    kimchi:  ["veggie",  "matchan", "meat"],
    grain:   ["health",  "snack",   "veggie"],
    health:  ["snack",   "grain",   "matchan"],
    snack:   ["grain",   "health",  "matchan"],
  };

  function pickByCat(catKey, minCount) {
    minCount = minCount || 10;
    const primary = ITEMS.filter(it => it.cat === catKey);
    const picked = primary.slice();
    if (picked.length >= minCount) return { items: picked, primaryCount: primary.length };

    // 관련 카테고리에서 보충
    const related = RELATED[catKey] || [];
    for (const rcat of related) {
      const more = ITEMS.filter(it => it.cat === rcat);
      for (const it of more) {
        if (picked.length >= minCount) break;
        if (!picked.find(p => p.n === it.n)) picked.push(it);
      }
      if (picked.length >= minCount) break;
    }
    // 그래도 부족하면 전체에서 채움
    if (picked.length < minCount) {
      for (const it of ITEMS) {
        if (picked.length >= minCount) break;
        if (!picked.find(p => p.n === it.n)) picked.push(it);
      }
    }
    return { items: picked, primaryCount: primary.length };
  }

  function handleCat(catKey) {
    const cat = CATS[catKey];
    if (!cat) return;
    const { items, primaryCount } = pickByCat(catKey, 10);
    if (!items.length) return;

    removeEntry();

    addUserBubble(`${cat.e} ${cat.label}`);
    const t = addTyping();
    setTimeout(() => {
      t.remove();
      // 1단계: 카테고리 톤 멘트 (감성)
      const quip = cat.quips[Math.floor(Math.random() * cat.quips.length)];
      addBotBubble(`${quip} ${cat.e}`);
      setTimeout(() => {
        // 2단계: 라인업 안내
        addBotBubble(`이번 주 혜택 가득한 기획전에서 골라봤어요 👇`);
        addCardsCarousel(items, cat.label);
        setTimeout(() => addDeadlineCard(), 450);
      }, 480);
    }, 720);
  }

  document.getElementById("quick").addEventListener("click", (e) => {
    const b = e.target.closest("button");
    if (!b) return;
    handleCat(b.dataset.cat);
  });

  function handleAge(ageKey) {
    const age = AGES[ageKey];
    if (!age) return;
    const items = age.picks.map(name => ITEMS.find(it => it.n === name)).filter(Boolean);
    if (!items.length) return;

    removeEntry();

    addUserBubble(`${age.e} ${age.label} 추천 받기`);
    const t = addTyping();
    setTimeout(() => {
      t.remove();
      const quip = age.quips[Math.floor(Math.random() * age.quips.length)];
      addBotBubble(`${quip} ${age.e}`);
      setTimeout(() => {
        addBotBubble(`이번 주 혜택 가득한 기획전에서 골라봤어요 👇`);
        addCardsCarousel(items, age.label);
        setTimeout(() => addDeadlineCard(), 450);
      }, 480);
    }, 720);
  }

  document.getElementById("quick-age").addEventListener("click", (e) => {
    const b = e.target.closest("button");
    if (!b) return;
    handleAge(b.dataset.age);
  });

  // ===== 카운트다운 =====
  const DEADLINE = new Date(2026, 4, 14, 11, 30, 0);
  function pad(n){ return String(n).padStart(2,'0'); }
  function tick() {
    document.querySelectorAll('[data-cd]').forEach(el => {
      const now = new Date();
      let diff = Math.floor((DEADLINE - now)/1000);
      if (diff <= 0) {
        el.closest('.deadline-card').classList.add('closed');
        el.innerHTML = '<div style="text-align:center; padding: 10px 0; color: var(--ink-3); font-size:13px;">이번 주 주문은 마감되었어요</div>';
        return;
      }
      const d = Math.floor(diff/86400); diff -= d*86400;
      const h = Math.floor(diff/3600);  diff -= h*3600;
      const m = Math.floor(diff/60);    diff -= m*60;
      const s = diff;
      el.innerHTML =
        '<div class="cell"><b>'+pad(d)+'</b><span>일</span></div>' +
        '<div class="cell"><b>'+pad(h)+'</b><span>시간</span></div>' +
        '<div class="cell"><b>'+pad(m)+'</b><span>분</span></div>' +
        '<div class="cell"><b>'+pad(s)+'</b><span>초</span></div>';
    });
  }
  setInterval(tick, 1000);
</script>

  try {
    var params = new URLSearchParams(location.search);
    var src = (params.get('utm_source') || '').toLowerCase();
    if (src === 'rcs') hit('pageview-rcs');
    else if (src) hit('pageview-other');
    else hit('pageview-direct');
  } catch(e){}
  // 카테고리/연령 칩 클릭 집계
  document.addEventListener('click', function(e){
    var catBtn = e.target.closest('[data-cat]');
    if (catBtn) hit('click-cat-' + catBtn.dataset.cat);
    var ageBtn = e.target.closest('[data-age]');
    if (ageBtn) hit('click-age-' + ageBtn.dataset.age);
  }, { passive: true });
  // 외부 링크 클릭 (ecoop.or.kr)
  document.addEventListener('click', function(e){
    var a = e.target.closest('a');
    if (!a || !/ecoop\.or\.kr/i.test(a.href)) return;
    if (a.classList.contains('promo-banner')) hit('click-promo-banner');
    else if (a.classList.contains('cta'))      hit('click-deadline-cta');
    else if (a.classList.contains('product'))  hit('click-product');
    hit('click-all');
  }, { passive: true });
})();
</script>
</body>
</html>
