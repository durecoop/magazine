<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>두레생협 10주차 | 주문 마감 임박!</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #0a0a0a;
  color: #f0ece4;
  overflow-x: hidden;
}

/* ========== HERO ========== */
.hero {
  position: relative; height: 100vh; min-height: 700px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  background: radial-gradient(ellipse at 50% 30%, #2a0a0a 0%, #0a0a0a 70%);
}
.hero-overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 30% 50%, rgba(232,68,48,0.06), transparent 60%),
    radial-gradient(ellipse at 70% 40%, rgba(255,160,40,0.04), transparent 50%);
  pointer-events: none;
}

/* Animated alarm rings */
.alarm-ring {
  position: absolute; border-radius: 50%; pointer-events: none;
  border: 2px solid rgba(232,68,48,0.15);
  animation: alarmExpand 3s ease-out infinite;
}
@keyframes alarmExpand {
  0% { transform: scale(0.5); opacity: 0.6; }
  100% { transform: scale(3); opacity: 0; }
}

.hero-inner {
  display: flex; flex-direction: column; align-items: center;
  text-align: center; z-index: 2; position: relative;
  padding: 0 5%; max-width: 900px;
}

/* Urgency badge - pulsing */
.urgency-badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: linear-gradient(135deg, #e84430, #ff2020);
  color: #fff; padding: 12px 32px; border-radius: 40px;
  font-size: 16px; font-weight: 800; letter-spacing: 1px;
  margin-bottom: 32px;
  animation: urgencyPulse 1.5s ease-in-out infinite;
  box-shadow: 0 4px 30px rgba(232,68,48,0.5);
}
@keyframes urgencyPulse {
  0%, 100% { box-shadow: 0 4px 30px rgba(232,68,48,0.5); transform: scale(1); }
  50% { box-shadow: 0 4px 60px rgba(232,68,48,0.8); transform: scale(1.03); }
}
.urgency-badge .bell {
  display: inline-block;
  animation: bellShake 0.5s ease-in-out infinite;
}
@keyframes bellShake {
  0%, 100% { transform: rotate(0deg); }
  25% { transform: rotate(15deg); }
  75% { transform: rotate(-15deg); }
}

.hero-title {
  font-size: clamp(32px, 5.5vw, 60px); font-weight: 900;
  line-height: 1.3; margin-bottom: 16px;
  text-shadow: 0 4px 30px rgba(0,0,0,0.6);
}
.hero-title .time {
  background: linear-gradient(135deg, #ff4030, #ff8040);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-title .deadline {
  color: #fff;
  text-shadow: 0 0 40px rgba(255,64,48,0.4);
}

/* Countdown timer */
.countdown-area {
  margin: 28px 0 36px;
}
.countdown {
  display: flex; gap: 16px; justify-content: center; align-items: center;
}
.countdown-unit {
  display: flex; flex-direction: column; align-items: center;
}
.countdown-num {
  font-size: clamp(48px, 8vw, 80px); font-weight: 900;
  background: linear-gradient(180deg, #fff 0%, #ff9080 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  line-height: 1;
  filter: drop-shadow(0 0 20px rgba(255,64,48,0.3));
}
.countdown-label {
  font-size: 13px; font-weight: 600;
  color: rgba(240,236,228,0.4); margin-top: 6px;
  letter-spacing: 2px;
}
.countdown-sep {
  font-size: clamp(36px, 6vw, 60px); font-weight: 900;
  color: rgba(232,68,48,0.4); margin-top: -16px;
  animation: sepBlink 1s ease-in-out infinite;
}
@keyframes sepBlink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.hero-sub {
  font-size: clamp(15px, 2vw, 19px); font-weight: 300;
  color: rgba(240,236,228,0.6); margin-bottom: 40px; line-height: 1.7;
}
.hero-sub strong { color: #ff8060; font-weight: 600; }

.hero-cta-btn {
  display: inline-block; padding: 18px 56px;
  font-size: 18px; font-weight: 700; color: #fff;
  background: linear-gradient(135deg, #e84430, #d63020);
  border: none; border-radius: 60px; cursor: pointer;
  text-decoration: none;
  box-shadow: 0 8px 0 #901818, 0 12px 40px rgba(232,68,48,0.4);
  transition: all 0.15s ease; transform: translateY(0);
  animation: ctaPulse 2s ease-in-out infinite;
}
@keyframes ctaPulse {
  0%, 100% { box-shadow: 0 8px 0 #901818, 0 12px 40px rgba(232,68,48,0.4); }
  50% { box-shadow: 0 8px 0 #901818, 0 12px 60px rgba(232,68,48,0.7); }
}
.hero-cta-btn:hover {
  background: linear-gradient(135deg, #ff5040, #e84430);
}
.hero-cta-btn:active {
  transform: translateY(4px);
  box-shadow: 0 4px 0 #901818, 0 6px 20px rgba(232,68,48,0.4);
}

/* Expired state */
.hero.expired .urgency-badge {
  background: linear-gradient(135deg, #666, #444);
  animation: none;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.hero.expired .countdown-num {
  background: linear-gradient(180deg, #888 0%, #555 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  filter: none;
}

@media (max-width: 900px) {
  .hero-inner { padding-top: 80px; }
  .countdown { gap: 10px; }
}
</style>
</head>
<body>

<!-- ===== HERO ===== -->
<section class="hero" id="hero">
  <div class="hero-overlay"></div>

  <!-- Alarm ring effects -->
  <div class="alarm-ring" style="width:200px;height:200px;top:15%;left:10%;animation-delay:0s;"></div>
  <div class="alarm-ring" style="width:150px;height:150px;top:60%;right:8%;animation-delay:1s;"></div>
  <div class="alarm-ring" style="width:180px;height:180px;bottom:20%;left:20%;animation-delay:2s;"></div>

  <div class="hero-inner">
    <div class="urgency-badge">
      <span class="bell">&#128276;</span>
      마감 임박
    </div>

    <h1 class="hero-title">
      오늘 <span class="time">오전 11시 30분</span><br>
      <span class="deadline">이번 주 주문 마감!</span>
    </h1>

    <div class="countdown-area">
      <div class="countdown" id="countdown">
        <div class="countdown-unit">
          <span class="countdown-num" id="cd-hours">00</span>
          <span class="countdown-label">시간</span>
        </div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit">
          <span class="countdown-num" id="cd-minutes">00</span>
          <span class="countdown-label">분</span>
        </div>
        <span class="countdown-sep">:</span>
        <div class="countdown-unit">
          <span class="countdown-num" id="cd-seconds">00</span>
          <span class="countdown-label">초</span>
        </div>
      </div>
    </div>

    <p class="hero-sub">
      제철 향기 가득한 <strong>봄동</strong>부터,<br>
      7만원 이상 구매하면 <strong>바나나 송송 증정</strong>까지!<br>
      놓치지 마세요.
    </p>

    <a class="hero-cta-btn" href="https://ecoop.or.kr/DureShop/plan/planView.do?returnTypeGb=plan&returnNo=1642">
      지금 주문하러 가기 &rarr;
    </a>
  </div>
</section>

<script>
// Countdown to 2026-03-05 11:30:00 KST
const deadline = new Date('2026-03-05T11:30:00+09:00');

function updateCountdown() {
  const now = new Date();
  let diff = deadline - now;

  const heroEl = document.querySelector('.hero');
  const hoursEl = document.getElementById('cd-hours');
  const minsEl = document.getElementById('cd-minutes');
  const secsEl = document.getElementById('cd-seconds');

  if (diff <= 0) {
    hoursEl.textContent = '00';
    minsEl.textContent = '00';
    secsEl.textContent = '00';
    heroEl.classList.add('expired');
    document.querySelector('.urgency-badge').innerHTML = '<span class="bell">&#128276;</span> 마감 완료';
    return;
  }

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  const secs = Math.floor((diff % (1000 * 60)) / 1000);

  hoursEl.textContent = String(hours).padStart(2, '0');
  minsEl.textContent = String(mins).padStart(2, '0');
  secsEl.textContent = String(secs).padStart(2, '0');
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
