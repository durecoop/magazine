const IMG_BASE = "https://dureimg.ecoop.or.kr:9091/Delsys/DLOG/Goods/GoodsMaster/GoodsImage/";
const SHOP_URL = "https://www.ecoop.or.kr/DureShop/recommend.do";
const fmt = n => n.toLocaleString('ko-KR');

const slidesEl = document.getElementById('slides');
const sideNavEl = document.getElementById('sideNav');

items.forEach(it=>{
  const hasDiscount = it.orig && it.rate > 0;
  const slide = document.createElement('section');
  slide.className = 'slide';
  slide.dataset.cat = it.cat;
  slide.dataset.num = it.n;
  slide.innerHTML = `
    <div class="slide-inner">
      <div class="slide-image">
        <div class="num-badge">${String(it.n).padStart(2,'0')}번</div>
        ${hasDiscount ? `<div class="discount-badge">${it.rate}%</div>` : ''}
        <img src="${IMG_BASE}${it.img}" alt="${it.name}" loading="lazy" onerror="this.style.opacity=0.3;this.style.objectFit='contain';this.style.padding='40px'">
      </div>
      <div class="slide-info">
        <div class="cat">${it.cat}</div>
        <h2>${it.name}</h2>
        <p class="desc">${it.desc}</p>
        <div class="price-block">
          ${hasDiscount ? `<span class="orig">${fmt(it.orig)}원</span>` : ''}
          <span class="now">${fmt(it.price)}<span class="won">원</span></span>
          ${hasDiscount ? `<span class="rate">${it.rate}% 할인</span>` : ''}
        </div>
        <a href="${SHOP_URL}" target="_blank" class="cta order-link">두레추천 바로가기 <span class="arrow">→</span></a>
      </div>
    </div>
  `;
  slidesEl.appendChild(slide);

  const dot = document.createElement('button');
  dot.className = 'dot-nav';
  dot.dataset.target = it.n;
  dot.title = `${it.n}. ${it.name}`;
  dot.addEventListener('click', ()=>{
    document.querySelector(`.slide[data-num="${it.n}"]`).scrollIntoView({behavior:'smooth'});
  });
  sideNavEl.appendChild(dot);
});

// 스크롤 진행도 + 현재 번호
const progressBar = document.getElementById('progressBar');
const curNum = document.getElementById('curNum');
const dots = document.querySelectorAll('.dot-nav');
const slidesAll = document.querySelectorAll('.slide');

function update(){
  const max = document.documentElement.scrollHeight - window.innerHeight;
  const pct = (window.scrollY / max) * 100;
  progressBar.style.width = pct + '%';

  let cur = 0;
  slidesAll.forEach(s=>{
    const r = s.getBoundingClientRect();
    if(r.top < window.innerHeight*0.5 && r.bottom > window.innerHeight*0.5){
      cur = parseInt(s.dataset.num);
    }
  });
  if(cur > 0){
    curNum.textContent = String(cur).padStart(2,'0');
    dots.forEach(d=>d.classList.toggle('active', parseInt(d.dataset.target)===cur));
  } else {
    curNum.textContent = '00';
    dots.forEach(d=>d.classList.remove('active'));
  }
}
window.addEventListener('scroll', update, {passive:true});
window.addEventListener('resize', update);
update();
</script>

<script>
(function(){
  var NS = 'durecoop-dure-recommend-0518';
  var API = 'https://abacus.jasoncameron.dev/hit/' + NS + '/';
  function hit(key){
    try { fetch(API + key, { mode: 'cors', keepalive: true, cache: 'no-store' }).catch(function(){}); } catch(e){}
  }
  hit('pageview');
  try {
    var params = new URLSearchParams(location.search);
    var src = (params.get('utm_source') || '').toLowerCase();
    if (src === 'rcs') hit('pageview-rcs');
    else if (src) hit('pageview-other');
    else hit('pageview-direct');
  } catch(e){}
  document.querySelectorAll('a').forEach(function(a){
    if (!/ecoop\.or\.kr/i.test(a.href)) return;
    a.addEventListener('click', function(){
      var key = null;
      if (a.classList.contains('hero-cta')) key = 'click-hero';
      else if (a.classList.contains('outro-cta')) key = 'click-outro';
      else if (a.classList.contains('order-link')) key = 'click-product';
      if (key) hit(key);
      hit('click-all');
    }, { passive: true });
  });
})();
</script>
