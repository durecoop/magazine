<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<meta name="theme-color" content="#e91e63">
<title>주말클릭 · 고기데이 — 돼지LA갈비</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{
    word-break:keep-all;
    overflow-wrap:break-word;
    -webkit-text-size-adjust:100%;
  }
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,-apple-system,sans-serif;
    background:
      radial-gradient(120% 60% at 50% 0%, #ff6fa3 0%, #e91e63 40%, #ad1457 100%);
    color:#fff;
    min-height:100vh;
    line-height:1.7;
    padding:0 0 40px;
  }
  .wrap{
    max-width:520px;
    margin:0 auto;
    padding:18px 18px 24px;
  }

  /* 상단 헤더 */
  .top{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    gap:10px;
    padding:18px 4px 22px;
    font-weight:800;
    letter-spacing:-.5px;
    text-shadow:0 2px 14px rgba(0,0,0,.35);
  }
  .top .small{
    font-size:22px;
    font-weight:800;
    opacity:.98;
  }
  .top .badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:10px 18px;
    background:#fff;
    color:#e91e63;
    border-radius:999px;
    font-weight:900;
    font-size:26px;
    box-shadow:0 6px 18px rgba(0,0,0,.18);
  }
  .top .badge::after{content:"⏰";font-size:18px}
  .shake{display:inline-block; animation:shake 1.4s ease-in-out infinite}
  @keyframes shake{
    0%,100%{transform:rotate(0)}
    20%{transform:rotate(-12deg)}
    40%{transform:rotate(10deg)}
    60%{transform:rotate(-6deg)}
    80%{transform:rotate(4deg)}
  }

  /* 메인 GIF */
  .hero{
    position:relative;
    border-radius:22px;
    overflow:hidden;
    box-shadow:0 16px 40px rgba(0,0,0,.35);
    background:#000;
  }
  .hero img{
    width:100%;
    height:auto;
    display:block;
  }
  .hero::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.18);
    border-radius:22px;
  }

  /* 상품 카드 */
  .card{
    margin-top:22px;
    background:#fff;
    color:#222;
    border-radius:22px;
    padding:24px 22px 22px;
    box-shadow:0 18px 44px rgba(0,0,0,.25);
  }
  .tagline{
    display:inline-block;
    background:#fff0f5;
    color:#e91e63;
    font-weight:800;
    font-size:15px;
    padding:6px 12px;
    border-radius:999px;
    letter-spacing:-.3px;
    margin-bottom:14px;
  }
  h1.name{
    font-size:30px;
    font-weight:900;
    letter-spacing:-1px;
    color:#1a1a1a;
    line-height:1.25;
  }
  .spec{
    margin-top:6px;
    font-size:17px;
    color:#666;
    font-weight:600;
  }

  .price-row{
    margin-top:18px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
  }
  .price-was{
    font-size:18px;
    color:#999;
    text-decoration:line-through;
    font-weight:600;
  }
  .discount{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    background:#ff1744;
    color:#fff;
    font-weight:900;
    font-size:18px;
    padding:6px 12px;
    border-radius:999px;
    box-shadow:0 6px 14px rgba(255,23,68,.35);
  }
  .price-now{
    margin-top:6px;
    font-size:46px;
    font-weight:900;
    color:#e91e63;
    letter-spacing:-2px;
    line-height:1;
  }
  .price-now .won{
    font-size:24px;
    color:#1a1a1a;
    margin-left:4px;
    font-weight:800;
  }

  .desc{
    margin-top:18px;
    padding-top:18px;
    border-top:1px dashed #e5e5e5;
    font-size:18px;
    color:#333;
    font-weight:600;
    line-height:1.7;
  }

  .gallery{
    margin-top:20px;
    display:grid;
    grid-template-columns:1fr;
    gap:12px;
  }
  .gallery figure{
    margin:0;
    background:#faf6f2;
    border-radius:14px;
    overflow:hidden;
    box-shadow:0 6px 16px rgba(0,0,0,.08);
  }
  .gallery img{
    width:100%;
    height:auto;
    display:block;
    aspect-ratio:1/1;
    object-fit:cover;
  }
  .gallery-stamp{
    display:flex;
    align-items:center;
    justify-content:center;
    margin:-38px auto;
    position:relative;
    z-index:2;
    pointer-events:none;
  }
  .gallery-stamp span{
    width:100px;
    height:100px;
    border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #fff 0%, #fff0f5 80%);
    border:3px dashed #e91e63;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:900;
    font-size:17px;
    color:#e91e63;
    letter-spacing:-.5px;
    line-height:1.15;
    transform:rotate(-10deg);
    box-shadow:0 10px 24px rgba(233,30,99,.28);
    animation:stamp-wobble 2.6s ease-in-out infinite;
  }
  @keyframes stamp-wobble{
    0%,100%{transform:rotate(-10deg) scale(1)}
    50%{transform:rotate(-3deg) scale(1.06)}
  }
  .sparkle{
    position:relative;
    margin-top:14px;
    text-align:center;
    font-size:22px;
    font-weight:900;
    letter-spacing:-.5px;
    background:linear-gradient(90deg,#ff1744 0%,#ffb300 25%,#ff1744 50%,#ffb300 75%,#ff1744 100%);
    background-size:200% auto;
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
    color:transparent;
    animation:shimmer 2s linear infinite;
  }
  .sparkle::after{
    content:"✨";
    -webkit-text-fill-color:initial;
    color:#ffb300;
    margin:0 6px;
    display:inline-block;
    animation:twinkle 1.2s ease-in-out infinite;
    filter:drop-shadow(0 0 6px rgba(255,179,0,.7));
  }
  @keyframes shimmer{
    0%{background-position:0% center}
    100%{background-position:200% center}
  }
  @keyframes twinkle{
    0%,100%{transform:scale(1) rotate(0); opacity:1}
    50%{transform:scale(1.4) rotate(20deg); opacity:.6}
  }

  /* CTA */
  .cta{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    margin-top:20px;
    width:100%;
    padding:20px;
    background:linear-gradient(135deg,#ff1744 0%,#e91e63 100%);
    color:#fff;
    text-decoration:none;
    font-size:21px;
    font-weight:900;
    border-radius:16px;
    letter-spacing:-.5px;
    box-shadow:0 12px 28px rgba(233,30,99,.4);
    transition:transform .15s ease;
  }
  .cta:active{transform:scale(.98)}
  .cta::after{
    content:"→";
    font-size:24px;
    transition:transform .2s ease;
  }
  .cta:hover::after{transform:translateX(4px)}

  .footnote{
    margin-top:18px;
    text-align:center;
    font-size:14px;
    color:rgba(255,255,255,.85);
    line-height:1.6;
  }
  .footnote strong{color:#fff;font-weight:800}

  /* 모바일 최적화 */
  @media (max-width:380px){
    .wrap{padding:14px}
    .top{font-size:18px}
    h1.name{font-size:26px}
    .price-now{font-size:40px}
  }
</style>
</head>
<body>
  <div class="wrap">

    <div class="hero">
      <img src="main.gif" alt="돼지LA갈비 고기데이">
    </div>

    <div class="card">
      <span class="tagline">🥩 주말이니까, 더 큰 혜택!</span>
      <h1 class="name">돼지LA갈비</h1>
      <div class="spec">1kg · 냉동</div>

      <div class="price-row">
        <span class="price-was">20,000원</span>
        <span class="discount">20% 할인</span>
      </div>
      <div class="price-now">15,900<span class="won">원</span></div>

      <p class="desc">
        양념 쏙 밴 부드러운 한 점, 뜯는 재미까지<br>
        <strong style="color:#e91e63">씨알도야지 LA갈비용</strong>
      </p>

      <div class="gallery">
        <figure>
          <img src="product-plate.jpg" alt="돼지LA갈비 생고기">
        </figure>
        <div class="gallery-stamp" aria-hidden="true">
          <span>★<br>주말<br>BEST</span>
        </div>
        <figure>
          <img src="product-package.jpg" alt="씨알도야지 LA갈비용 포장">
        </figure>
      </div>

      <div class="sparkle">이번 주말만 특별 할인!</div>

      <a class="cta hero-cta" href="https://www.ecoop.or.kr/DureShop/plan/planView.do?returnTypeGb=plan&returnNo=1674" target="_blank" rel="noopener">
        <span>이번 주말은<br>LA갈비 굽는 날!</span>
      </a>
    </div>

    <p class="footnote">
      이번 주말 놓치면 다음 주에 만나요
    </p>

  </div>

<script>
(function(){
  var NS = 'durecoop-weekend-click-la-galbi';
  var API = 'https://abacus.jasoncameron.dev/hit/' + NS + '/';
  function hit(key){
    try { fetch(API + key, { mode:'cors', keepalive:true, cache:'no-store' }).catch(function(){}); } catch(e){}
  }
  hit('pageview');
  try {
    var params = new URLSearchParams(location.search);
    var src = (params.get('utm_source') || '').toLowerCase();
    if (src === 'rcs') hit('pageview-rcs');
    else if (src) hit('pageview-other');
    else hit('pageview-direct');
  } catch(e){}
  document.querySelectorAll('a').forEach(function(a){
    if (!/ecoop\.or\.kr/i.test(a.href)) return;
    a.addEventListener('click', function(){
      var key = null;
      if (a.classList.contains('hero-cta')) key = 'click-hero';
      else if (a.classList.contains('outro-cta')) key = 'click-outro';
      else if (a.classList.contains('order-link')) key = 'click-product';
      if (key) hit(key);
      hit('click-all');
    }, { passive:true });
  });
})();
</script>
</body>
</html>
