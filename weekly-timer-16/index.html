    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #fff7f0;
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            word-break: keep-all;
            padding-top: 24vh;
            border: 2px solid rgba(255, 107, 53, 0.2);
            box-shadow: inset 0 0 60px rgba(255, 107, 53, 0.03);
        }

        .marquee-wrap {
            position: fixed;
            left: 0;
            right: 0;
            z-index: 10;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            border-top: 1px solid rgba(0, 0, 0, 0.06);
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }

        .marquee-top {
            top: 0;
            height: 24vh;
        }

        .marquee-track {
            display: flex;
            width: max-content;
            animation: marquee-scroll 180s linear infinite;
        }

        @keyframes marquee-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .marquee-wrap:hover .marquee-track {
            animation-play-state: paused;
        }

        .marquee-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            padding: 0.6rem 0.8rem;
            flex-shrink: 0;
            cursor: default;
            transition: transform 0.2s;
        }

        .marquee-item:hover {
            transform: scale(1.05);
        }

        .marquee-item img {
            width: 28vw;
            height: 28vw;
            max-width: 180px;
            max-height: 180px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .marquee-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            white-space: nowrap;
        }

        .marquee-name {
            font-size: 0.85rem;
            color: #555;
            max-width: 28vw;
            overflow: hidden;
            text-overflow: ellipsis;
            text-align: center;
        }

        .marquee-discount {
            font-size: 0.95rem;
            font-weight: 900;
            color: #ff6b35;
        }

        .marquee-sep {
            display: none;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .glow-1 {
            background: #ffb6c1;
            top: -200px;
            left: -100px;
            opacity: 0.25;
        }

        .glow-2 {
            background: #a8e6cf;
            bottom: -200px;
            right: -100px;
            opacity: 0.25;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
            max-width: 700px;
        }

        .spring-banner {
            font-size: 2.2rem;
            font-weight: 900;
            color: #e5552a;
            margin-bottom: 1.2rem;
            letter-spacing: 1px;
        }

        .spring-banner .flower {
            font-size: 2rem;
            display: inline-block;
            animation: flower-bounce 1.5s ease-in-out infinite;
        }

        .spring-banner .flower:last-child {
            animation-delay: 0.3s;
        }

        @keyframes flower-bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-6px) rotate(10deg); }
        }

        .badge {
            display: inline-block;
            background: rgba(255, 107, 53, 0.15);
            border: 1px solid rgba(255, 107, 53, 0.4);
            color: #ff6b35;
            padding: 0.4rem 1.2rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            animation: pulse-badge 2s ease-in-out infinite;
        }

        @keyframes pulse-badge {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 107, 53, 0.3); }
            50% { box-shadow: 0 0 20px 5px rgba(255, 107, 53, 0.15); }
        }

        .headline {
            font-size: 2rem;
            font-weight: 900;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }

        .headline .accent {
            color: #ff6b35;
        }

        .sub {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 2.5rem;
        }

        .timer {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .timer-unit {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 16px;
            padding: 1.2rem 1rem;
            min-width: 100px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s, border-color 0.3s;
        }

        .timer-unit:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 107, 53, 0.3);
        }

        .timer-value {
            font-size: 3.5rem;
            font-weight: 900;
            line-height: 1;
            background: linear-gradient(135deg, #333 30%, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .timer-label {
            font-size: 0.8rem;
            color: #888;
            margin-top: 0.5rem;
            letter-spacing: 2px;
        }

        .colon {
            font-size: 3rem;
            font-weight: 900;
            color: #ff6b35;
            align-self: center;
            padding-bottom: 1.2rem;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .cta-btn {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b35, #e5552a);
            color: #fff;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: 700;
            padding: 1rem 3rem;
            border-radius: 60px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 30px rgba(255, 107, 53, 0.3);
        }

        .cta-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 40px rgba(255, 107, 53, 0.5);
        }

        .cta-btn:active {
            transform: scale(0.97);
        }

        .expired .timer-value {
            background: linear-gradient(135deg, #bbb, #999);
            -webkit-background-clip: text;
            background-clip: text;
        }

        .expired-msg {
            display: none;
            font-size: 1.2rem;
            color: #ff6b35;
            margin-bottom: 2rem;
            font-weight: 700;
        }

        .expired .expired-msg {
            display: block;
        }

        @media (max-width: 600px) {
            body {

            .timer-value {

            .colon {

                padding: 0.9rem 1.5rem;
            }

            .marquee-item img {
                width: 26vw;
                height: 26vw;
            }
        }
    </style>
</head>

        (function() {
            var deadline = new Date(2026, 3, 16, 11, 30, 0);
            var $h = document.getElementById('hours');
            var $m = document.getElementById('minutes');
            var $s = document.getElementById('seconds');
            var $app = document.getElementById('app');

            function pad(n) {
                return String(n).padStart(2, '0');
            }

            function tick() {
                var diff = deadline - Date.now();
                if (diff <= 0) {
                    $h.textContent = '00';
                    $m.textContent = '00';
                    $s.textContent = '00';
                    $app.classList.add('expired');
                    return;

                var totalSec = Math.floor(diff / 1000);
                $h.textContent = pad(Math.floor(totalSec / 3600));
                $m.textContent = pad(Math.floor((totalSec % 3600) / 60));
                $s.textContent = pad(totalSec % 60);
                requestAnimationFrame(tick);

            function buildMarquee(container) {
                var track = document.createElement('div');
                track.className = 'marquee-track';

                for (var s = 0; s < 2; s++) {
                    items.forEach(function(item, i) {
                        var el = document.createElement('div');
                        el.className = 'marquee-item';
                        var discountHtml = item.rate > 0
                            ? '<span class="marquee-discount">' + item.rate + '% 할인</span>'
                            : '';
                        el.innerHTML = '<img src="' + BASE + item.img + '" alt="' + item.name + '" loading="lazy">' +
                                      '<div class="marquee-info">' +
                                      '<span class="marquee-name">' + item.name + '</span>' +
                                      discountHtml +
                                      '</div>';
                        track.appendChild(el);

                        if (i < items.length - 1 || s === 0) {
                            var sep = document.createElement('span');
                            sep.className = 'marquee-sep';
                            sep.textContent = '·';
                            track.appendChild(sep);
                        }
                    });
                }
                container.appendChild(track);
            }

            buildMarquee(document.getElementById('marqueeTop'));
        })();
