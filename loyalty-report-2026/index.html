const PctTooltip = ({active, payload, label, suffix='%'}) => {
  if (!active || !payload || !payload.length) return null;
  return (
    <div className="bg-white px-3 py-2 rounded-lg border border-green-100 shadow-md text-sm">
      <div className="font-semibold mb-1">{label}</div>
      {payload.map((p,i)=>(
        <div key={i} className="flex items-center gap-2">
          <span className="w-2.5 h-2.5 rounded-full" style={{background: p.color}}/>
          <span className="text-slate-600">{p.name}</span>
          <span className="font-semibold num-tab text-slate-800 ml-auto">{p.value==null?'—':p.value+suffix}</span>
        </div>
      ))}
    </div>
  );
};

            body="가입 후 60~90일 구간이 정착 분기점. 2회차 주문 시 정기배송 제안 + 카테고리 추천 묶음 발송으로 락인 강화. 후속 단계 조합원 가입 선물 의존도 축소를 위한 구조적 해법."
            target="신규 가입 후 M+2 도달 회원"
            expect="M+2~M+5 장기 LTV 향상, 후속 선물 비용 절감"
          />
        </div>
      </div>
    </div>
  </SlideShell>
);

const ActionCard = ({num, tone, icon, title, body, target, expect}) => {
  const m = {
    red:    { tag:'bg-red-100 text-red-800',       border:'border-red-200',    iconBg:'bg-red-600' },
    amber:  { tag:'bg-amber-100 text-amber-800',   border:'border-amber-200',  iconBg:'bg-amber-500' },
    green:  { tag:'bg-green-100 text-green-800',   border:'border-green-200',  iconBg:'bg-green-600' },
  }[tone];
  return (
    <div className={`bg-white border ${m.border} rounded-xl p-4 flex gap-3`}>
      <div className={`${m.iconBg} text-white w-9 h-9 rounded-lg flex items-center justify-center shrink-0`}>{icon}</div>
      <div className="flex-1 min-w-0">
        <div className="flex items-center gap-2 mb-1">
          <span className={`text-xs font-bold px-2 py-0.5 rounded ${m.tag}`}>{num}</span>
          <h4 className="text-sm font-bold text-slate-800">{title}</h4>
        </div>
        <p className="text-xs text-slate-600 leading-relaxed mb-2">{body}</p>
        <div className="flex flex-wrap gap-2 text-xs">
          <span className="bg-slate-100 text-slate-700 px-2 py-0.5 rounded">대상: {target}</span>
          <span className="bg-green-50 text-green-800 px-2 py-0.5 rounded font-medium">기대효과: {expect}</span>
        </div>
      </div>
    </div>
  );
};

/* =========================== App =========================== */
const slides = [Slide1, Slide2, Slide3, Slide4, Slide5, Slide6, Slide7, Slide8, Slide9, Slide10];
const slideTitles = [
  '표지',
  '핵심 요약',
  '신규 가입자 분석 — 잔존율 이해하기',
  '신규 가입자 분석 — 조합원 가입 선물 효과',
  '신규 가입자 분석 — 2026 위험 신호',
  '기존 단골 분석 — 등급 시스템',
  '기존 단골 분석 — B등급 위기',
  '기존 단골 분석 — VIP 충성도',
  '통합 진단 — 단골 깔때기',
  '결론 & 액션 플랜',
];

function App() {
  const [idx, setIdx] = useState(0);
  const total = slides.length;

  useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        setIdx(i => Math.min(i+1, total-1));
      }
      if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        setIdx(i => Math.max(i-1, 0));
      }
      if (e.key === 'Home') setIdx(0);
      if (e.key === 'End')  setIdx(total-1);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [total]);

  const Current = slides[idx];

  return (
    <div className="min-h-screen flex flex-col items-center justify-center px-6 py-8" style={{background: C.bg}}>
      {/* Slide stage */}
      <div className="w-full" style={{maxWidth: '1280px'}}>
        <div className="aspect-[16/9] w-full">
          <Current/>
        </div>
      </div>

      {/* Bottom nav */}
      <div className="fixed bottom-5 left-1/2 -translate-x-1/2 bg-white rounded-full shadow-2xl border border-green-200 flex items-center px-2 py-2 gap-1 z-50">
        <button
          onClick={()=>setIdx(i=>Math.max(i-1,0))}
          disabled={idx===0}
          className="w-9 h-9 rounded-full flex items-center justify-center text-green-700 hover:bg-green-50 disabled:opacity-30 disabled:cursor-not-allowed"
          title="이전 (←)"
        ><I.Left className="w-4 h-4"/></button>

        <div className="flex items-center gap-1.5 px-3">
          {Array.from({length:total}).map((_,i)=>(
            <button key={i} onClick={()=>setIdx(i)}
              title={`${i+1}. ${slideTitles[i]}`}
              className={`h-2 rounded-full transition-all ${i===idx?'bg-green-600 w-7':'bg-slate-300 w-2 hover:bg-green-300'}`}/>
          ))}
        </div>

        <div className="num-tab text-xs font-bold text-slate-600 px-3 border-l border-slate-200">
          {String(idx+1).padStart(2,'0')} / {String(total).padStart(2,'0')}
        </div>

        <button
          onClick={()=>setIdx(i=>Math.min(i+1,total-1))}
          disabled={idx===total-1}
          className="w-9 h-9 rounded-full flex items-center justify-center text-green-700 hover:bg-green-50 disabled:opacity-30 disabled:cursor-not-allowed"
          title="다음 (→)"
        ><I.Right className="w-4 h-4"/></button>
      </div>

      {/* Section indicator (top-left fixed) */}
      <div className="fixed top-4 left-4 bg-white/80 backdrop-blur border border-green-200 rounded-full px-3 py-1.5 text-xs font-medium text-green-800 z-40 hidden md:flex items-center gap-2">
        <I.Sprout className="w-3.5 h-3.5"/>
        <span>{slideTitles[idx]}</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

  var API = 'https://abacus.jasoncameron.dev/hit/' + NS + '/';
  function hit(key){
    try { fetch(API + key, { mode: 'cors', keepalive: true, cache: 'no-store' }).catch(function(){}); } catch(e){}
  }
  hit('pageview');
  try {
    var params = new URLSearchParams(location.search);

    if (src === 'rcs') hit('pageview-rcs');
    else if (src) hit('pageview-other');

  } catch(e){}

</script>
</body>
