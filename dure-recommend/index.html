const PLACEHOLDER = "data:image/svg+xml;utf8," + encodeURIComponent(
  `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400'><rect fill='#e8f0e8' width='400' height='400'/><text x='50%' y='50%' text-anchor='middle' fill='#006731' font-size='32' font-family='sans-serif' dy='.3em'>두레생협</text></svg>`
);

function StarRating({ count, size = 14 }) {
  return (
    <div className="flex gap-0.5">
      {[1,2,3,4,5].map(i => <StarIcon key={i} filled={i <= count} size={size} />)}
    </div>
  );
}

function PointCard({ point }) {
  if (point.type === 'review') {
    return (
      <div className="rounded-xl bg-white border border-gray-100 shadow-sm p-3">
        <div className="flex items-center justify-between">
          <StarRating count={point.stars} />
          <span className="text-[10px] text-gray-400">{point.author}</span>
        </div>
        <p className="mt-1.5 text-[12.5px] text-gray-700 leading-relaxed line-clamp-2">"{point.text}"</p>
      </div>
    );
  }
  // highlight
  return (
    <div className="rounded-xl bg-white border border-[#006731]/15 shadow-sm p-3 flex items-start gap-2">
      <span className="shrink-0 mt-0.5 text-[#006731]"><Sparkle size={14}/></span>
      <p className="text-[13px] text-gray-800 leading-relaxed font-medium">{point.text}</p>
    </div>
  );
}

function ProductSlide({ product, index, total }) {
  const reviews = product.points.filter(p => p.type === 'review');
  const hasReviews = reviews.length > 0;
  const avg = hasReviews ? (reviews.reduce((s, r) => s + r.stars, 0) / reviews.length).toFixed(1) : null;
  const sectionTitle = hasReviews ? "조합원 후기 & 추천 포인트" : "두레추천 포인트";

  return (
    <section className="slide relative w-full bg-gradient-to-b from-[#fafdf8] to-white flex flex-col">
      <div className="relative w-full shrink-0" style={{ height: '40vh', minHeight: '260px' }}>
        <img
          src={product.imageUrl}
          alt={product.name}
          loading="lazy"
          className="w-full h-full object-cover"
          onError={(e) => { e.target.src = PLACEHOLDER; }}
        />
        <div className="absolute inset-x-0 bottom-0 h-20 bg-gradient-to-t from-[#fafdf8] to-transparent"></div>

        {product.tag && (
          <div className="absolute left-4 z-10 flex items-center gap-1 bg-[#006731] text-white text-[11px] font-semibold pl-2 pr-2.5 py-1 rounded-full shadow-lg" style={{ top: 'calc(env(safe-area-inset-top, 0px) + 64px)' }}>
            <Leaf size={12} />{product.tag}
          </div>
        )}

        {product.discountRate > 0 && (
          <div className="absolute right-5 z-10 badge-float flex flex-col items-center justify-center w-[78px] h-[78px] rounded-full bg-yellow-400 text-[#005429] shadow-2xl ring-4 ring-white" style={{ top: 'calc(env(safe-area-inset-top, 0px) + 56px)' }}>
            <span className="text-[26px] font-extrabold leading-none">{product.discountRate}%</span>
            <span className="text-[10px] font-bold mt-0.5">할인</span>
          </div>
        )}

        <button className="absolute right-4 bottom-4 z-10 w-10 h-10 rounded-full bg-white/90 backdrop-blur flex items-center justify-center text-gray-400 hover:text-red-500 shadow">
          <Heart size={18} />
        </button>
      </div>

      <div className="flex-1 px-5 pt-2 pb-24 flex flex-col">
        <h2 className="text-[22px] font-extrabold text-gray-900 leading-tight">{product.name}</h2>

        {hasReviews ? (
          <div className="mt-1 flex items-center gap-1.5">
            <StarRating count={Math.round(avg)} size={13} />
            <span className="text-[11px] text-gray-500">{avg} · 후기 {reviews.length}건</span>
          </div>
        ) : (
          <div className="mt-1 flex items-center gap-1 text-[#006731]/80">
            <Leaf size={11}/>
            <span className="text-[11px] font-semibold">두레생협이 추천하는 생활재</span>
          </div>
        )}

        <div className="mt-2 flex items-baseline gap-2">
          {product.discountRate > 0 && (
            <span className="text-[12px] text-gray-400 line-through">{product.originalPrice.toLocaleString()}원</span>
          )}
          <span className="text-[28px] font-extrabold text-red-600 leading-none">
            {product.salePrice.toLocaleString()}<span className="text-[16px] ml-0.5 font-bold">원</span>
          </span>
        </div>

        <div className="mt-3.5 flex-1">
          <div className="flex items-center gap-1.5 mb-2">
            <span className="w-1 h-3.5 bg-[#006731] rounded-full"></span>
            <h3 className="text-[12px] font-bold text-[#006731]">{sectionTitle}</h3>
          </div>
          <div className="space-y-1.5">
            {product.points.slice(0, 3).map((p, i) => <PointCard key={i} point={p} />)}
          </div>
        </div>

        <div className="mt-2 text-center text-[10px] text-gray-400 flex items-center justify-center gap-1">
          {index + 1} / {total}
          {index < total - 1 && <span className="hint-bounce inline-flex"><ChevronDown size={12}/></span>}
        </div>
      </div>
    </section>
  );
}

function App() {
  const containerRef = useRef(null);
  const [current, setCurrent] = useState(0);

  useEffect(() => {
    const el = containerRef.current;
    if (!el) return;
    let raf;
    const onScroll = () => {
      cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        const idx = Math.round(el.scrollTop / el.clientHeight);
        setCurrent(idx);
      });
    };
    el.addEventListener('scroll', onScroll, { passive: true });
    return () => el.removeEventListener('scroll', onScroll);
  }, []);

  return (
    <div className="relative w-full max-w-[440px] mx-auto bg-white shadow-2xl overflow-hidden" style={{ height: '100%' }}>
      <header className="absolute top-0 left-0 right-0 z-30 bg-white/85 backdrop-blur-md border-b border-gray-100" style={{ paddingTop: 'env(safe-area-inset-top, 0px)' }}>
        <div className="flex items-center justify-between px-4 py-2.5">
          <div className="flex items-center gap-2">
            <div className="w-9 h-9 rounded-full bg-[#006731] flex items-center justify-center text-white font-extrabold text-[15px] shadow-md">두</div>
            <div className="leading-tight">
              <p className="text-[10px] text-gray-500">두레생협</p>
              <p className="text-[14px] font-extrabold text-[#006731]">이번 주 두레추천</p>
            </div>
          </div>
          <div className="flex items-center gap-1 bg-[#f0f7f1] text-[#006731] text-[11px] font-bold px-2.5 py-1 rounded-full">
            <Leaf size={11}/>{current + 1}/{products.length}
          </div>
        </div>
      </header>

      <div ref={containerRef} className="snap-container">
        {products.map((p, i) => (
          <ProductSlide key={i} product={p} index={i} total={products.length} />
        ))}
      </div>

      <div className="absolute bottom-0 left-0 right-0 z-30 bg-white/95 backdrop-blur-md border-t border-gray-100 px-4 py-3" style={{ paddingBottom: 'calc(env(safe-area-inset-bottom, 0px) + 12px)' }}>
        <a href="https://www.ecoop.or.kr/DureShop/recommend.do" target="_blank" rel="noopener" className="w-full bg-[#006731] hover:bg-[#005429] active:bg-[#003d1f] text-white font-extrabold py-3.5 rounded-2xl flex items-center justify-center gap-2 shadow-lg transition no-underline">
          <ExternalLinkIcon />
          <span className="text-[15px]">두레추천 전체보기</span>
        </a>
      </div>

      {current === 0 && (
        <div className="absolute bottom-24 left-1/2 -translate-x-1/2 z-20 flex flex-col items-center text-[#006731]/60 hint-bounce pointer-events-none">
          <ChevronDown size={20} />
          <span className="text-[10px] font-semibold -mt-1">아래로 스와이프</span>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
