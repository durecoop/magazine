<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Potato's House</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:'Jua',sans-serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center}

.world{display:flex;align-items:stretch;gap:0}
.house{position:relative;width:900px;height:620px;background:#2a1f14;border-radius:0 12px 12px 0;border:4px solid #3d2b1a;border-left:none;box-shadow:0 0 60px rgba(0,0,0,.5),0 0 120px rgba(0,0,0,.3);overflow:hidden}

/* ======== GREENHOUSE ======== */
.greenhouse{position:relative;width:220px;height:620px;background:#1a2e1a;border-radius:12px 0 0 12px;border:4px solid #2a4a2a;border-right:3px solid #3d2b1a;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.5)}
.gh-label{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(150,255,150,.35);letter-spacing:2px;white-space:nowrap;z-index:1}
.gh-floor{position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(255,255,255,.02) 0px,rgba(255,255,255,.02) 1px,transparent 1px,transparent 55px),linear-gradient(180deg,#1a2e1a,#162816)}
/* LED strip at top */
.gh-led{position:absolute;top:30px;left:15px;right:15px;height:8px;background:#333;border-radius:4px;z-index:2;transition:all .5s}
.gh-led.on{background:#ff8c30;box-shadow:0 0 12px #ff8c30aa,0 0 30px #ff8c3044}
.gh-led-beam{position:absolute;top:38px;left:0;right:0;bottom:0;background:transparent;z-index:1;pointer-events:none;transition:all .5s}
.gh-led-beam.on{background:linear-gradient(180deg,rgba(255,140,48,.1) 0%,rgba(255,140,48,.04) 40%,rgba(255,140,48,.02) 100%)}

/* Shelf rows */
.gh-shelf{position:absolute;left:12px;right:12px;height:3px;background:#4a3520;z-index:2}
.gh-shelf1{top:120px}
.gh-shelf2{top:270px}
.gh-shelf3{top:420px}

/* Soil trays */
.gh-tray{position:absolute;left:18px;right:18px;height:22px;background:linear-gradient(180deg,#4a3020,#3a2518);border-radius:3px;z-index:2}
.gh-tray1{top:98px}
.gh-tray2{top:248px}
.gh-tray3{top:398px}

/* Individual plants */
/* Plants container */
.gh-plant{position:absolute;z-index:3;text-align:center}
.gh-plant .stem{display:block;margin:0 auto;border-radius:1px}
.gh-plant .pot-label{font-size:8px;color:rgba(255,255,255,.45);margin-top:2px;white-space:nowrap}

/* === Tomato (1단, center) === */
.tomato-plant{left:85px;top:48px}
.tomato-stem{width:3px;height:55px;background:#3a7a30}
.t-leaf{position:absolute;background:#4a8a3a;border-radius:50%}
.t-l1{top:8px;left:-12px;width:16px;height:9px;transform:rotate(-25deg)}
.t-l2{top:8px;right:-12px;width:16px;height:9px;transform:rotate(25deg)}
.t-l3{top:22px;left:-10px;width:14px;height:8px;background:#4a9a3a;transform:rotate(-18deg)}
.t-l4{top:22px;right:-10px;width:14px;height:8px;background:#4a9a3a;transform:rotate(18deg)}
.t-l5{top:36px;left:-8px;width:12px;height:7px;background:#5aaa4a;transform:rotate(-12deg)}
.t-l6{top:36px;right:-8px;width:12px;height:7px;background:#5aaa4a;transform:rotate(12deg)}
.t-f1{position:absolute;top:-4px;left:-8px;width:16px;height:16px;background:radial-gradient(circle at 40% 35%,#f44,#c22);border-radius:50%}
.t-f1::after{content:'';position:absolute;top:-3px;left:5px;width:6px;height:5px;background:#3a7a30;border-radius:0 0 3px 3px}
.t-f2{position:absolute;top:0;right:-10px;width:13px;height:13px;background:radial-gradient(circle at 40% 35%,#e66,#c33);border-radius:50%}
.t-f2::after{content:'';position:absolute;top:-2px;left:4px;width:5px;height:4px;background:#3a7a30;border-radius:0 0 2px 2px}
.t-f3{position:absolute;top:-6px;left:4px;width:11px;height:11px;background:radial-gradient(circle at 40% 35%,#fa6,#da4);border-radius:50%}

/* === Paprika (2단, center) === */
.paprika-plant{left:85px;top:178px}
.paprika-stem{width:3px;height:52px;background:#3a7a30}
.pk-leaf{position:absolute;background:#4a9a3a;border-radius:50%}
.pk-l1{top:10px;left:-11px;width:15px;height:9px;transform:rotate(-22deg)}
.pk-l2{top:10px;right:-11px;width:15px;height:9px;transform:rotate(22deg)}
.pk-l3{top:24px;left:-9px;width:13px;height:7px;background:#4a8a3a;transform:rotate(-15deg)}
.pk-l4{top:24px;right:-9px;width:13px;height:7px;background:#4a8a3a;transform:rotate(15deg)}
.pk-f1{position:absolute;top:-5px;left:-12px;width:14px;height:20px;background:radial-gradient(ellipse at 40% 30%,#f44,#c22);border-radius:6px 6px 8px 8px}
.pk-f1::after{content:'';position:absolute;top:-4px;left:4px;width:5px;height:6px;background:#3a7a30;border-radius:1px}
.pk-f2{position:absolute;top:-2px;right:-10px;width:12px;height:18px;background:radial-gradient(ellipse at 40% 30%,#ff0,#da0);border-radius:5px 5px 7px 7px}
.pk-f2::after{content:'';position:absolute;top:-3px;left:3px;width:5px;height:5px;background:#3a7a30;border-radius:1px}
.pk-f3{position:absolute;top:3px;left:4px;width:11px;height:16px;background:radial-gradient(ellipse at 40% 30%,#f80,#c60);border-radius:5px 5px 6px 6px}

/* === Perilla / 깻잎 (3단, center) === */
.perilla-plant{left:85px;top:310px}
.perilla-stem{width:3px;height:55px;background:#3a6a30}
.pr-leaf{position:absolute;border-radius:4px 4px 40% 40%;border:1px solid #2a5a2a}
.pr-l1{top:0;left:-18px;width:22px;height:16px;background:radial-gradient(ellipse,#3a7a3a,#2a5a2a);transform:rotate(-10deg)}
.pr-l2{top:0;right:-18px;width:22px;height:16px;background:radial-gradient(ellipse,#3a7a3a,#2a5a2a);transform:rotate(10deg)}
.pr-l3{top:15px;left:-16px;width:20px;height:14px;background:radial-gradient(ellipse,#3a8a3a,#2a6a2a);transform:rotate(-14deg)}
.pr-l4{top:15px;right:-16px;width:20px;height:14px;background:radial-gradient(ellipse,#3a8a3a,#2a6a2a);transform:rotate(14deg)}
.pr-l5{top:30px;left:-14px;width:18px;height:12px;background:radial-gradient(ellipse,#4a9a4a,#3a7a3a);transform:rotate(-10deg);border-color:#3a7a3a}
.pr-l6{top:30px;right:-14px;width:18px;height:12px;background:radial-gradient(ellipse,#4a9a4a,#3a7a3a);transform:rotate(10deg);border-color:#3a7a3a}

/* === Rice / 벼 (4단, center) === */
.rice-plant{left:75px;top:430px;width:40px;height:60px}
/* 3 stems growing from soil, each bending at top with grain cluster */
.r-stem{position:absolute;bottom:0;width:2px;background:#7aaa4a;transform-origin:bottom center}
.r-s1{left:10px;height:55px;transform:rotate(-5deg)}
.r-s2{left:20px;height:50px;transform:rotate(3deg)}
.r-s3{left:30px;height:52px;transform:rotate(-2deg)}
/* Drooping grain heads */
.r-head{position:absolute;transform-origin:left center}
.r-h1{left:8px;top:2px;transform:rotate(25deg)}
.r-h2{left:19px;top:6px;transform:rotate(-20deg)}
.r-h3{left:29px;top:4px;transform:rotate(15deg)}
.r-grains{display:flex;gap:1px;transform:rotate(5deg)}
.r-g{width:4px;height:6px;background:linear-gradient(180deg,#e8c840,#d0a830);border-radius:2px 2px 3px 3px}
/* Leaves: long thin blades arching out */
.r-leaf{position:absolute;height:3px;border-radius:0 6px 6px 0;background:#6aaa4a}
.r-lf1{left:4px;bottom:20px;width:22px;transform:rotate(-20deg);transform-origin:left}
.r-lf2{left:26px;bottom:18px;width:20px;transform:rotate(15deg) scaleX(-1);transform-origin:left;background:#7aba5a}
.r-lf3{left:8px;bottom:35px;width:18px;transform:rotate(-12deg);transform-origin:left}
.r-lf4{left:24px;bottom:32px;width:16px;transform:rotate(10deg) scaleX(-1);transform-origin:left;background:#7aba5a}

/* Shelves: 4 tiers */
.gh-shelf{position:absolute;left:12px;right:12px;height:3px;background:#4a3520;z-index:2}
.gh-shelf1{top:118px}
.gh-shelf2{top:248px}
.gh-shelf3{top:378px}
.gh-shelf4{top:505px}
.gh-tray{position:absolute;left:18px;right:18px;height:20px;background:linear-gradient(180deg,#4a3020,#3a2518);border-radius:3px;z-index:2}
.gh-tray1{top:98px}
.gh-tray2{top:228px}
.gh-tray3{top:358px}
.gh-tray4{top:485px}

/* Water pipe */
.gh-pipe{position:absolute;left:50%;transform:translateX(-50%);width:4px;background:#4a6a8a;z-index:2;border-radius:2px}
.gh-pipe1{top:121px;height:107px}
.gh-pipe2{top:251px;height:107px}
.gh-pipe3{top:381px;height:104px}

/* Water drip animation */
.gh-drip{position:absolute;z-index:4;pointer-events:none;opacity:0}
.gh-drip-drop{width:3px;height:5px;background:#6af;border-radius:0 50% 50% 50%;transform:rotate(45deg)}
@keyframes dripFall{0%{opacity:1;transform:rotate(45deg) translateY(0)}100%{opacity:0;transform:rotate(45deg) translateY(30px)}}

/* Temp/humidity display */
.gh-display{position:absolute;bottom:20px;left:15px;right:15px;height:50px;background:#0a1a0a;border:1px solid #2a4a2a;border-radius:4px;z-index:2;padding:6px 8px;font-family:monospace;font-size:9px;color:#5a5}
.gh-display-row{display:flex;justify-content:space-between;margin-bottom:2px}
.room{position:absolute;border:3px solid #3d2b1a;overflow:hidden}
.room-label{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.3);letter-spacing:2px;z-index:1;white-space:nowrap}

/* === ROOMS === */
.bedroom{left:0;top:0;width:360px;height:310px;background:#2d2545}
.closet{left:360px;top:0;width:220px;height:190px;background:#2b2040}
.bathroom{left:360px;top:190px;width:220px;height:120px;background:#1e3a3a}
.livingroom{left:580px;top:0;width:320px;height:410px;background:#2e2418}
.kitchen{left:0;top:310px;width:580px;height:310px;background:#33291e}
.entrance{left:580px;top:410px;width:320px;height:210px;background:#2a2a2a}

/* === DOORS === */
.door{position:absolute;z-index:2}
.door-bk{left:130px;top:308px;width:60px;height:8px;background:#5a4a30}
.door-bc{left:358px;top:70px;width:8px;height:50px;background:#5a4a30}
.door-btk{left:420px;top:308px;width:50px;height:8px;background:#5a4a30}
.door-lk{left:578px;top:320px;width:8px;height:50px;background:#5a4a30}
.door-le{left:650px;top:408px;width:50px;height:8px;background:#5a4a30}
.door-ke{left:578px;top:480px;width:8px;height:50px;background:#5a4a30}

.f{position:absolute;z-index:1}

/* ======== BEDROOM ======== */
.bed{left:20px;top:50px;width:120px;height:180px;background:#5c4a8a;border-radius:8px;border:2px solid #4a3870}
.bed::before{content:'';position:absolute;top:0;left:8px;right:8px;height:50px;background:#7a6aaa;border-radius:6px 6px 0 0}
.bed::after{content:'';position:absolute;top:55px;left:12px;width:94px;height:110px;background:repeating-linear-gradient(45deg,#6b5a9a,#6b5a9a 8px,#7264a0 8px,#7264a0 16px);border-radius:4px}
.pillow1{left:35px;top:58px;width:40px;height:22px;background:#c8b8e8;border-radius:10px}
.pillow2{left:82px;top:58px;width:40px;height:22px;background:#b8a8d8;border-radius:10px}
.nightstand{left:155px;top:100px;width:40px;height:40px;background:#5a4020;border-radius:4px;border:1px solid #6a5030}
.lamp{left:163px;top:78px;width:24px;height:26px}
.lamp::before{content:'';position:absolute;bottom:0;left:9px;width:6px;height:12px;background:#8a7050}
.lamp::after{content:'';position:absolute;top:0;left:2px;width:20px;height:14px;background:#ffdd44;border-radius:10px 10px 2px 2px;box-shadow:0 0 15px #ffdd44aa,0 0 30px #ffdd4444}
.desk{left:220px;top:50px;width:115px;height:50px;background:#5a4020;border-radius:3px;border:1px solid #6a5030}
.monitor{left:245px;top:30px;width:60px;height:36px;background:#111;border-radius:3px;border:2px solid #444}
.monitor::after{content:'> _';position:absolute;top:8px;left:8px;color:#0f0;font-size:10px;font-family:monospace;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.monitor-stand{left:268px;top:66px;width:14px;height:6px;background:#444;border-radius:0 0 3px 3px}
.desk-chair{left:252px;top:108px;width:36px;height:36px;background:#3a3a3a;border-radius:50%;border:2px solid #555}
.bedroom-rug{left:160px;top:200px;width:100px;height:70px;background:radial-gradient(ellipse,#4a3870,#3a2860);border-radius:50%;opacity:.4}
.alarm-clock{left:160px;top:105px;width:14px;height:12px;background:#c44;border-radius:3px}
.alarm-clock::after{content:'';position:absolute;top:2px;left:4px;width:6px;height:6px;border:1px solid #fff;border-radius:50%}

/* ======== CLOSET ======== */
.wardrobe{left:375px;top:25px;width:190px;height:50px;background:#6a4d70;border-radius:4px;border:2px solid #5a3d60}
.wardrobe::before{content:'';position:absolute;top:4px;left:4px;width:88px;height:40px;background:#5a3d60;border-radius:2px;border:1px solid #7a5d80}
.wardrobe::after{content:'';position:absolute;top:4px;right:4px;width:88px;height:40px;background:#5a3d60;border-radius:2px;border:1px solid #7a5d80}
.wardrobe-knob1{left:460px;top:43px;width:6px;height:6px;background:#c0a080;border-radius:50%}
.wardrobe-knob2{left:474px;top:43px;width:6px;height:6px;background:#c0a080;border-radius:50%}
.hanger-rod{left:380px;top:85px;width:120px;height:3px;background:#8a7050}
.hanger-rod::before{content:'';position:absolute;left:0;top:-2px;width:3px;height:7px;background:#8a7050}
.hanger-rod::after{content:'';position:absolute;right:0;top:-2px;width:3px;height:7px;background:#8a7050}
.shirt1{left:390px;top:88px;width:22px;height:28px;background:#e66;border-radius:3px 3px 0 0}
.shirt2{left:418px;top:88px;width:22px;height:32px;background:#69c;border-radius:3px 3px 0 0}
.shirt3{left:446px;top:88px;width:22px;height:26px;background:#6b6;border-radius:3px 3px 0 0}
.dress1{left:474px;top:88px;width:22px;height:38px;background:#c6a;border-radius:3px 3px 8px 8px}
.mirror{left:520px;top:80px;width:40px;height:60px;background:linear-gradient(135deg,#668,#aac,#779);border-radius:20px 20px 4px 4px;border:3px solid #8a7050}
.mirror::after{content:'';position:absolute;top:8px;left:8px;width:12px;height:20px;background:rgba(255,255,255,.15);border-radius:8px;transform:rotate(-15deg)}
.closet-drawer{left:380px;top:140px;width:80px;height:35px;background:#5a3d60;border-radius:3px;border:1px solid #7a5d80}
.closet-drawer::before{content:'';position:absolute;top:8px;left:5px;right:5px;height:8px;background:#4a2d50;border-radius:2px}
.closet-drawer::after{content:'';position:absolute;bottom:5px;left:5px;right:5px;height:8px;background:#4a2d50;border-radius:2px}

/* ======== BATHROOM ======== */
.bathtub{left:375px;top:210px;width:100px;height:50px;background:#e8e8e8;border-radius:25px;border:3px solid #ccc}
.bathtub::before{content:'';position:absolute;top:8px;left:8px;right:8px;bottom:8px;background:linear-gradient(180deg,#a0d8ef,#80c0df);border-radius:20px;opacity:.6}
.bathtub::after{content:'';position:absolute;top:3px;right:12px;width:8px;height:8px;background:#bbb;border-radius:50%;border:1px solid #999}
.bath-bubbles{left:395px;top:220px;width:60px;height:20px}
.bath-bubbles::before{content:'';position:absolute;left:0;top:0;width:12px;height:12px;background:rgba(255,255,255,.3);border-radius:50%;box-shadow:15px 3px 0 rgba(255,255,255,.25),30px -2px 0 rgba(255,255,255,.2),45px 1px 0 rgba(255,255,255,.15)}
.toilet{left:500px;top:218px;width:32px;height:40px;background:#e8e8e8;border-radius:8px 8px 14px 14px;border:2px solid #ccc}
.toilet::before{content:'';position:absolute;top:-12px;left:2px;width:26px;height:16px;background:#ddd;border-radius:4px 4px 0 0;border:2px solid #ccc}
.toilet::after{content:'';position:absolute;top:6px;left:8px;width:14px;height:8px;background:#cde;border-radius:50%;opacity:.5}
.toilet-paper{left:536px;top:228px;width:14px;height:16px;background:#f5f5f0;border-radius:3px;border:1px solid #ddd}
.toilet-paper::after{content:'';position:absolute;bottom:-6px;left:3px;width:8px;height:8px;background:#f5f5f0;border-radius:0 0 2px 2px}
.bath-sink{left:550px;top:210px;width:22px;height:30px;background:#e8e8e8;border-radius:4px 4px 12px 12px;border:2px solid #ccc}
.bath-sink::before{content:'';position:absolute;top:-8px;left:6px;width:8px;height:10px;background:#bbb;border-radius:2px}
.towel-rack{left:548px;top:270px;width:24px;height:4px;background:#8a7050}
.towel-rack::after{content:'';position:absolute;top:4px;left:2px;width:20px;height:12px;background:#7ac;border-radius:0 0 3px 3px;opacity:.8}
.bath-mat{left:485px;top:270px;width:40px;height:24px;background:#5a8a8a;border-radius:3px;opacity:.4}

/* ======== LIVING ROOM ======== */
.sofa{left:610px;top:40px;width:160px;height:65px;background:#8b5e3c;border-radius:12px;border:2px solid #6b4020}
.sofa::before{content:'';position:absolute;top:8px;left:8px;width:65px;height:45px;background:#a07050;border-radius:8px}
.sofa::after{content:'';position:absolute;top:8px;right:8px;width:65px;height:45px;background:#a07050;border-radius:8px}
.sofa-pillow{left:658px;top:48px;width:20px;height:20px;background:#c9a;border-radius:4px;transform:rotate(15deg)}
.tv-stand{left:650px;top:148px;width:100px;height:30px;background:#4a3520;border-radius:3px;border:1px solid #5a4530}
.tv{left:658px;top:120px;width:84px;height:32px;background:#111;border-radius:3px;border:2px solid #333;overflow:hidden}
.tv::after{content:'';position:absolute;inset:0;background:linear-gradient(45deg,#236,#325,#234);animation:tvFlicker 3s infinite}
@keyframes tvFlicker{0%,100%{opacity:.5}50%{opacity:.8}}
.tv-remote{left:700px;top:195px;width:10px;height:22px;background:#333;border-radius:3px}
.coffee-table{left:640px;top:210px;width:80px;height:50px;background:#5a4020;border-radius:6px;border:1px solid #6a5030}
.coffee-mug{left:660px;top:222px;width:12px;height:10px;background:#ddd;border-radius:2px;border:1px solid #bbb}
.coffee-mug::after{content:'';position:absolute;top:1px;right:-5px;width:5px;height:6px;border:1px solid #bbb;border-left:none;border-radius:0 3px 3px 0}
.lr-bookshelf{left:845px;top:40px;width:40px;height:120px;background:#5a4020;border-radius:3px;border:1px solid #6a5030}
.lr-bookshelf::before{content:'';position:absolute;top:5px;left:4px;width:12px;height:28px;background:#c44;border-radius:1px;box-shadow:14px 0 0 #49a,0 35px 0 #4a4,14px 35px 0 #a8a,0 70px 0 #aa4,14px 70px 0 #68c}
.plant1{left:830px;top:180px;width:35px;height:45px}
.plant1::before{content:'';position:absolute;bottom:0;left:8px;width:20px;height:16px;background:#8b5e3c;border-radius:2px 2px 5px 5px;border:1px solid #7a4e2c}
.plant1::after{content:'';position:absolute;top:0;left:5px;width:26px;height:30px;background:radial-gradient(ellipse,#4a9a4a,#3a7a3a);border-radius:50% 50% 30% 30%}
.plant2{left:600px;top:350px;width:30px;height:38px}
.plant2::before{content:'';position:absolute;bottom:0;left:6px;width:16px;height:13px;background:#c0a080;border-radius:2px 2px 4px 4px}
.plant2::after{content:'';position:absolute;top:0;left:4px;width:22px;height:26px;background:radial-gradient(ellipse,#5aaa5a,#3a8a3a);border-radius:50% 50% 30% 30%}
/* Cat tower */
.cat-tower{left:840px;top:240px;width:36px;height:90px}

<script>
const house = document.getElementById('house');

// ===== ROOM GRAPH WITH DOOR-ONLY MOVEMENT =====
// Each room: walkable waypoints inside.
// Doors: connection points between exactly 2 rooms.
// Character must go: current room waypoints -> door -> next room waypoints

const rooms = {
  bedroom:    { pts: [{x:180,y:180},{x:280,y:160},{x:300,y:260},{x:180,y:260},{x:200,y:130}] },
  closet:     { pts: [{x:420,y:110},{x:500,y:100},{x:470,y:160},{x:430,y:160}] },
  bathroom:   { pts: [{x:420,y:260},{x:500,y:250},{x:540,y:260}] },
  livingroom: { pts: [{x:680,y:130},{x:760,y:200},{x:700,y:300},{x:820,y:300},{x:680,y:260},{x:750,y:370}] },
  kitchen:    { pts: [{x:160,y:360},{x:300,y:480},{x:440,y:470},{x:500,y:400},{x:160,y:480},{x:350,y:380},{x:440,y:560},{x:160,y:560}] },
  entrance:   { pts: [{x:680,y:500},{x:750,y:530},{x:820,y:490},{x:680,y:560}] }
};

// Doors: each connects two rooms with a position on each side
const doors = [
  { id:'bk',  rooms:['bedroom','kitchen'],    posA:{x:160,y:305}, posB:{x:160,y:318} },
  { id:'bc',  rooms:['bedroom','closet'],      posA:{x:355,y:95},  posB:{x:368,y:95}  },
  { id:'btk', rooms:['bathroom','kitchen'],    posA:{x:445,y:305}, posB:{x:445,y:318} },
  { id:'lk',  rooms:['livingroom','kitchen'],  posA:{x:582,y:345}, posB:{x:575,y:345} },
  { id:'le',  rooms:['livingroom','entrance'], posA:{x:675,y:405}, posB:{x:675,y:415} },
  { id:'ke',  rooms:['kitchen','entrance'],    posA:{x:575,y:505}, posB:{x:585,y:505} }
];

// Build adjacency graph
const adj = {};
for (const r in rooms) adj[r] = [];
for (const d of doors) {
  adj[d.rooms[0]].push({ to: d.rooms[1], door: d });
  adj[d.rooms[1]].push({ to: d.rooms[0], door: d });
}

// BFS to find room path
function findRoomPath(fromRoom, toRoom) {
  if (fromRoom === toRoom) return [fromRoom];
  const visited = new Set([fromRoom]);
  const queue = [[fromRoom]];
  while (queue.length) {
    const path = queue.shift();
    const cur = path[path.length - 1];
    for (const edge of adj[cur]) {
      if (!visited.has(edge.to)) {
        const np = [...path, edge.to];
        if (edge.to === toRoom) return np;
        visited.add(edge.to);
        queue.push(np);
      }
    }
  }
  return [fromRoom]; // fallback
}

// Get door positions for transitioning between two adjacent rooms
function getDoorPositions(roomA, roomB) {
  for (const d of doors) {
    if ((d.rooms[0]===roomA && d.rooms[1]===roomB)) return { exit: d.posA, enter: d.posB };
    if ((d.rooms[1]===roomA && d.rooms[0]===roomB)) return { exit: d.posB, enter: d.posA };
  }
  return null;
}

// Determine which room a point is in
function whichRoom(x, y) {
  const bounds = {
    bedroom:    {x1:0,y1:0,x2:360,y2:310},
    closet:     {x1:360,y1:0,x2:580,y2:190},
    bathroom:   {x1:360,y1:190,x2:580,y2:310},
    livingroom: {x1:580,y1:0,x2:900,y2:410},
    kitchen:    {x1:0,y1:310,x2:580,y2:620},
    entrance:   {x1:580,y1:410,x2:900,y2:620}
  };
  for (const r in bounds) {
    const b = bounds[r];
    if (x >= b.x1 && x <= b.x2 && y >= b.y1 && y <= b.y2) return r;
  }
  return 'kitchen';
}

// Build full waypoint path from current pos/room to a target room+point
function buildPath(fromX, fromY, fromRoom, targetRoom) {
  const targetPt = rooms[targetRoom].pts[Math.floor(Math.random() * rooms[targetRoom].pts.length)];
  const roomPath = findRoomPath(fromRoom, targetRoom);

  const waypoints = [];
  let curRoom = fromRoom;

  for (let i = 1; i < roomPath.length; i++) {
    const nextRoom = roomPath[i];
    const dp = getDoorPositions(curRoom, nextRoom);
    if (dp) {
      waypoints.push({ ...dp.exit, room: curRoom });
      waypoints.push({ ...dp.enter, room: nextRoom });
    }
    curRoom = nextRoom;
  }

  waypoints.push({ ...targetPt, room: targetRoom });
  return waypoints;
}

// ===== CHARACTERS =====
const potato = document.createElement('div');
potato.className = 'ch';
potato.innerHTML = `<svg width="40" height="48" viewBox="0 0 40 48">
  <ellipse cx="20" cy="44" rx="12" ry="3" fill="#000" opacity=".25"/>
  <rect class="pl" x="12" y="35" width="5" height="9" rx="2.5" fill="#b8903a"/>
  <rect class="pr" x="23" y="35" width="5" height="9" rx="2.5" fill="#b8903a"/>
  <rect x="1" y="20" width="6" height="4" rx="2" fill="#b8903a" transform="rotate(-15 4 22)"/>
  <rect x="33" y="20" width="6" height="4" rx="2" fill="#b8903a" transform="rotate(15 36 22)"/>
  <ellipse cx="20" cy="22" rx="15" ry="17" fill="#d4a843"/>
  <ellipse cx="20" cy="30" rx="12" ry="7" fill="#c49b38" opacity=".2"/>
  <circle cx="12" cy="16" r="2" fill="#c49b38" opacity=".4"/>
  <circle cx="28" cy="26" r="1.8" fill="#c49b38" opacity=".3"/>
  <circle cx="33" cy="18" r="1.5" fill="#c49b38" opacity=".3"/>
  <ellipse cx="14" cy="20" rx="3.5" ry="4" fill="#fff"/>
  <ellipse cx="26" cy="20" rx="3.5" ry="4" fill="#fff"/>
  <circle cx="15" cy="20" r="2.2" fill="#2c2c2c"/>
  <circle cx="27" cy="20" r="2.2" fill="#2c2c2c"/>
  <circle cx="16" cy="18.5" r=".9" fill="#fff" opacity=".8"/>
  <circle cx="28" cy="18.5" r=".9" fill="#fff" opacity=".8"/>
  <path d="M11 15Q14 12 18 15" stroke="#5a3a20" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <path d="M22 15Q26 12 29 15" stroke="#5a3a20" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <ellipse cx="8" cy="25" rx="3" ry="2" fill="#e8896e" opacity=".5"/>
  <ellipse cx="32" cy="25" rx="3" ry="2" fill="#e8896e" opacity=".5"/>
  <path d="M16 28Q20 32 24 28" stroke="#6b3a2a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>`;
house.appendChild(potato);

const cat = document.createElement('div');
cat.className = 'ch';
cat.innerHTML = `<svg width="32" height="36" viewBox="0 0 32 36">
  <ellipse cx="16" cy="34" rx="8" ry="2" fill="#000" opacity=".2"/>
  <!-- Tail: calico orange+white -->
  <path class="ct" d="M26 24Q34 18 30 10" stroke="#e8943a" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M28 16Q32 13 30 10" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round" opacity=".5"/>
  <!-- Legs: white with orange/black patches -->
  <rect class="cl" x="9" y="27" width="4" height="7" rx="2" fill="#f5f0e8"/>
  <rect class="cr" x="19" y="27" width="4" height="7" rx="2" fill="#e8943a"/>
  <!-- Body: white base with calico patches -->
  <ellipse cx="16" cy="22" rx="11" ry="10" fill="#f5f0e8"/>
  <ellipse cx="10" cy="20" rx="5" ry="4" fill="#e8943a" opacity=".8"/>
  <ellipse cx="22" cy="24" rx="5" ry="4" fill="#3a3a3a" opacity=".7"/>
  <ellipse cx="16" cy="26" rx="4" ry="3" fill="#e8943a" opacity=".5"/>
  <!-- Head: white with calico patches -->
  <circle cx="16" cy="13" r="9" fill="#f5f0e8"/>
  <ellipse cx="10" cy="10" rx="5" ry="4" fill="#e8943a" opacity=".8"/>
  <ellipse cx="22" cy="11" rx="4" ry="3.5" fill="#3a3a3a" opacity=".7"/>
  <!-- Ears -->
  <polygon points="7,8 5,0 12,6" fill="#f5f0e8"/>
  <polygon points="25,8 27,0 20,6" fill="#3a3a3a" opacity=".8"/>
  <polygon points="8,7 6.5,2 11,6" fill="#f9a"/>
  <polygon points="24,7 25.5,2 21,6" fill="#f9a"/>
  <!-- Eyes -->
  <ellipse cx="12" cy="12" rx="2.5" ry="3" fill="#2c2c2c"/>
  <ellipse cx="20" cy="12" rx="2.5" ry="3" fill="#2c2c2c"/>
  <ellipse cx="12" cy="12" rx="1.2" ry="2.8" fill="#5a2"/>
  <ellipse cx="20" cy="12" rx="1.2" ry="2.8" fill="#5a2"/>
  <circle cx="12.5" cy="10.5" r=".8" fill="#fff" opacity=".8"/>
  <circle cx="20.5" cy="10.5" r=".8" fill="#fff" opacity=".8"/>
  <!-- Nose & mouth -->
  <polygon points="15,15 17,15 16,16.5" fill="#f9a"/>
  <path d="M13 17.5Q16 20 19 17.5" stroke="#b88" stroke-width=".8" fill="none"/>
  <!-- Whiskers -->
  <line x1="2" y1="14" x2="10" y2="15" stroke="#ccc" stroke-width=".5"/>
  <line x1="2" y1="16" x2="10" y2="16" stroke="#ccc" stroke-width=".5"/>
  <line x1="22" y1="15" x2="30" y2="14" stroke="#ccc" stroke-width=".5"/>
  <line x1="22" y1="16" x2="30" y2="16" stroke="#ccc" stroke-width=".5"/>
</svg>`;
house.appendChild(cat);

const pSp = document.createElement('div'); pSp.className='sp'; house.appendChild(pSp);
const cSp = document.createElement('div'); cSp.className='sp cat'; house.appendChild(cSp);

const pSayings = [
  '배고프다...','졸리다 zzZ','심심해~','퇴근하고싶다',
  '뭐 먹을까','아 피곤해','넷플릭스 볼까','오늘 뭐하지...',
  '치킨 먹고싶다','주말 언제 오냐','하...월요일',
  '커피 마셔야돼','아 집이 최고야','게임하고싶다',
  '냥이야 밥 줬지?','이불 밖은 위험해','라면 끓일까...',
  '아까 산 옷 입어볼까','샤워하고싶다','소파에 눕고싶어'
];
const cSayings = ['야옹~','냐옹!','야옹야옹~','뿌르르르','냐~','야옹..','미야옹~','그르릉','냥!','빠르르'];

function showSp(el,txt,x,y){
  el.textContent=txt;
  el.style.left=(x-10)+'px';
  el.style.top=(y-40)+'px';
  el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),2500);
}

// ===== MOVEMENT STATE =====
let pX=300, pY=480, pRoom='kitchen';
let pPath=[], pWalking=false, pFacing=false, pIdle=0, pSpT=2000;
const catHist=[];
const CAT_DELAY=45;
let cX=320,cY=500,cFacing=false,cSpT=4000,cWalking=false;
let legF=0,tailF=0;

function pickDest(){
  const roomNames=Object.keys(rooms);
  const dest=roomNames[Math.floor(Math.random()*roomNames.length)];
  pPath=buildPath(pX,pY,pRoom,dest);
}

pickDest();

let lastT=performance.now();
function loop(t){
  const dt=t-lastT; lastT=t;

  // Potato follows path
  if(pPath.length>0){
    const wp=pPath[0];
    const dx=wp.x-pX, dy=wp.y-pY;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<3){
      pRoom=wp.room;
      pPath.shift();
      pWalking=pPath.length>0;
      if(!pWalking) pIdle=0;
    } else {
      const spd=1.2;
      pX+=dx/dist*spd;
      pY+=dy/dist*spd;
      pFacing=dx<0;
      pWalking=true;
      pIdle=0;
    }
  } else {
    pWalking=false;
    pIdle+=dt;
    if(pIdle>2000+Math.random()*2500){
      pickDest();
      pIdle=0;
    }
  }

  // Cat follows potato through recorded path
  catHist.push({x:pX,y:pY});
  if(catHist.length>CAT_DELAY+5) catHist.shift();

  if(catHist.length>CAT_DELAY){
    const tgt=catHist[0];
    const cdx=tgt.x-cX,cdy=tgt.y-cY;
    const cd=Math.sqrt(cdx*cdx+cdy*cdy);
    if(cd>5){cX+=cdx/cd*1.1;cY+=cdy/cd*1.1;cFacing=cdx<0;cWalking=true}
    else cWalking=false;
  }

  // Speech
  pSpT-=dt;
  if(pSpT<=0){showSp(pSp,pSayings[Math.floor(Math.random()*pSayings.length)],pX,pY);pSpT=4000+Math.random()*6000}
  cSpT-=dt;
  if(cSpT<=0){showSp(cSp,cSayings[Math.floor(Math.random()*cSayings.length)],cX,cY);cSpT=5000+Math.random()*7000}

  // Render positions
  potato.style.left=(pX-20)+'px';
  potato.style.top=(pY-24)+'px';
  cat.style.left=(cX-16)+'px';
  cat.style.top=(cY-18)+'px';

  const pSvg=potato.querySelector('svg');
  const cSvg=cat.querySelector('svg');

  if(pWalking){
    legF++;
    const a=Math.sin(legF*.3)*18;
    potato.querySelector('.pl').style.transform=`rotate(${a}deg)`;
    potato.querySelector('.pr').style.transform=`rotate(${-a}deg)`;
    pSvg.style.transform=pFacing?'scaleX(-1)':'';
  } else {
    potato.querySelector('.pl').style.transform='';
    potato.querySelector('.pr').style.transform='';
    const b=Math.sin(t*.003)*3;
    pSvg.style.transform=(pFacing?'scaleX(-1) ':'')+`translateY(${b}px)`;
  }

  if(cWalking){
    const a=Math.sin(legF*.3)*14;
    cat.querySelector('.cl').style.transform=`rotate(${a}deg)`;
    cat.querySelector('.cr').style.transform=`rotate(${-a}deg)`;
    cSvg.style.transform=cFacing?'scaleX(-1)':'';
  } else {
    cat.querySelector('.cl').style.transform='';
    cat.querySelector('.cr').style.transform='';
    const b=Math.sin(t*.004)*2;
    cSvg.style.transform=(cFacing?'scaleX(-1) ':'')+`translateY(${b}px)`;
  }

  // Tail wag
  tailF++;
  const tw=Math.sin(tailF*.08)*6;
  const tail=cat.querySelector('.ct');
  if(tail) tail.setAttribute('d',`M26 24Q${34+tw} 18 ${30+tw} 10`);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ========== GREENHOUSE LOGIC ==========
let lightOn = false;
let lightLevel = 70;
let waterLevel = 50;
let growth = 20;
let totalN = 0, totalP = 0, totalK = 0;

const ghLed = document.getElementById('ghLed');
const ghBeam = document.getElementById('ghBeam');
const waterBar = document.getElementById('waterBar');
const growthBar = document.getElementById('growthBar');

function toggleLight() {
  lightOn = !lightOn;
  const btn = document.getElementById('lightBtn');
  btn.textContent = lightOn ? 'ON' : 'OFF';
  btn.classList.toggle('on', lightOn);
  updateLight();
}

function setLightLevel(val) {
  lightLevel = parseInt(val);
  document.getElementById('lightVal').textContent = val + '%';
  updateLight();
}

function updateLight() {
  const opacity = lightLevel / 100;
  if (lightOn) {
    ghLed.className = 'gh-led on';
    ghLed.style.opacity = opacity;
    ghLed.style.boxShadow = `0 0 ${12*opacity}px rgba(255,140,48,${opacity*0.7}),0 0 ${30*opacity}px rgba(255,140,48,${opacity*0.3})`;
    ghBeam.className = 'gh-led-beam on';
    ghBeam.style.opacity = opacity;
  } else {
    ghLed.className = 'gh-led';
    ghLed.style.opacity = '';
    ghLed.style.boxShadow = '';
    ghBeam.className = 'gh-led-beam';
    ghBeam.style.opacity = '';
  }
}

function giveWater() {
  waterLevel = Math.min(100, waterLevel + 15);
  document.getElementById('ghWater').textContent = Math.round(waterLevel) + '%';
  waterBar.style.width = waterLevel + '%';

  // drip animation on all 4 drip points
  for (let i = 1; i <= 4; i++) {
    const drip = document.getElementById('drip' + i);
    const drop = drip.querySelector('.gh-drip-drop');
    drip.style.opacity = '1';
    drop.style.animation = 'none';
    drop.offsetHeight;
    drop.style.animation = `dripFall 0.8s ${i * 0.15}s ease-in forwards`;
  }
  setTimeout(() => {
    for (let i = 1; i <= 4; i++) document.getElementById('drip' + i).style.opacity = '0';
  }, 1500);

  // humidity bump
  const humEl = document.getElementById('ghHumid');
  const hum = Math.min(95, 65 + waterLevel * 0.3);
  humEl.textContent = Math.round(hum) + '%';

  checkGrowth();
}

function giveFertilizer() {
  const n = parseInt(document.getElementById('nSlider').value);
  const p = parseInt(document.getElementById('pSlider').value);
  const k = parseInt(document.getElementById('kSlider').value);
  totalN += n; totalP += p; totalK += k;

  document.getElementById('ghNpk').textContent = `${totalN}/${totalP}/${totalK}`;
  checkGrowth();
}

document.getElementById('nSlider').oninput = function() { document.getElementById('nVal').textContent = this.value; };
document.getElementById('pSlider').oninput = function() { document.getElementById('pVal').textContent = this.value; };
document.getElementById('kSlider').oninput = function() { document.getElementById('kVal').textContent = this.value; };

function checkGrowth() {
  let bonus = 0;
  if (lightOn) bonus += lightLevel * 0.03;
  if (waterLevel > 30) bonus += 3;
  bonus += Math.min(totalN, 300) * 0.015;
  bonus += Math.min(totalP, 300) * 0.012;
  bonus += Math.min(totalK, 300) * 0.012;

  growth = Math.min(100, growth + bonus);
  growthBar.style.width = growth + '%';
  document.getElementById('growthVal').textContent = Math.round(growth) + '%';

  // Scale all plants based on growth
  const scale = 0.6 + growth / 100 * 0.5;
  document.querySelectorAll('.gh-plant').forEach(p => {
    p.style.transform = `scale(${scale})`;
    p.style.transformOrigin = 'bottom center';
  });

  // Growth stage
  const stageEl = document.getElementById('growthStage');
  if (growth < 25) stageEl.textContent = 'Seedling';
  else if (growth < 50) stageEl.textContent = 'Growing';
  else if (growth < 75) stageEl.textContent = 'Mature';
  else if (growth < 95) stageEl.textContent = 'Fruiting';
  else stageEl.textContent = 'Harvest!';
}

// Water drain & temp fluctuation
setInterval(() => {
  if (waterLevel > 0) {
    waterLevel = Math.max(0, waterLevel - 0.5);
    document.getElementById('ghWater').textContent = Math.round(waterLevel) + '%';
    waterBar.style.width = waterLevel + '%';
  }
  // temp fluctuation
  const temp = (23.5 + Math.random() * 1.5 + (lightOn ? lightLevel * 0.02 : 0)).toFixed(1);
  document.getElementById('ghTemp').textContent = temp + 'C';
}, 2000);
</script>
