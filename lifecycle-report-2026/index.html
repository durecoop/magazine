];

function App() {
  const [i, setI] = useState(0);
  useEffect(() => {
    const onKey = (e) => {
      if (e.key === "ArrowRight" || e.key === "PageDown" || e.key === " ") setI(p => Math.min(slides.length-1, p+1));
      if (e.key === "ArrowLeft"  || e.key === "PageUp")    setI(p => Math.max(0, p-1));
      if (e.key === "Home") setI(0);
      if (e.key === "End")  setI(slides.length-1);
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);
  const Cur = slides[i];

  return (
    <div className="min-h-screen flex flex-col">

class ErrorBoundary extends React.Component {
  constructor(p){ super(p); this.state = { err: null }; }
  static getDerivedStateFromError(err){ return { err }; }
  componentDidCatch(err, info){ console.error(err, info); }
  render(){
    if (this.state.err) {
      return (
        <pre style={{color:'#fca5a5', background:'#0B1220', padding:24, whiteSpace:'pre-wrap', fontFamily:'monospace', fontSize:12, minHeight:'100vh', margin:0}}>
          [React 렌더 오류]{"\n\n"}
          {String(this.state.err && this.state.err.message)}{"\n\n"}
          {String(this.state.err && this.state.err.stack)}
        </pre>
      );
    }
    return this.props.children;
  }
}

try {
  ReactDOM.createRoot(document.getElementById("root")).render(
    <ErrorBoundary><App/></ErrorBoundary>
  );
} catch(e) {
  document.getElementById("root").innerHTML = '<pre style="color:#fca5a5;background:#0B1220;padding:24px;white-space:pre-wrap;font-family:monospace;font-size:12px;min-height:100vh;margin:0">[마운트 오류]\n\n' + (e.message || e) + '\n\n' + (e.stack || '') + '</pre>';
}
</script>
